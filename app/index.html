<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FET Structure Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Import Map for ES Modules -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>FET Structure Explorer</h1>
            <p>Constrained Random Design Engine</p>
        </header>
        
        <main class="main-content">
            <div class="controls-panel panel glass">
                <h2>Generation Settings</h2>
                <div class="control-group">
                    <label for="baselineSelect">Baseline Architecture</label>
                    <select id="baselineSelect">
                        <option value="finfet">FinFET</option>
                        <option value="mosfet">MOSFET</option>
                        <option value="gaafet" selected>GAAFET</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="numVariants">Number of Variants to Generate</label>
                    <input type="number" id="numVariants" value="50" min="10" max="1000">
                </div>
                <button id="generateBtn" class="primary-btn">Generate Structures</button>
            </div>

            <div class="results-container">
                <div class="table-panel panel glass">
                    <h2>Generated Structures</h2>
                    <div class="table-wrapper">
                        <table id="resultsTable">
                            <thead>
                                <tr>
                                    <th>Structure Summary</th>
                                    <th>Score</th>
                                    <th>Ion / Ioff</th>
                                    <th>Ion</th>
                                    <th>Ioff</th>
                                    <th>ΔT</th>
                                    <th>Rsd</th>
                                    <th>Cause of Change</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <!-- Results will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="viewer-panel panel glass">
                    <h2>3D Interactive View</h2>
                    <p id="viewerInstructions" class="instructions">Select a structure from the table to view its 3D model. Drag to rotate, scroll to zoom.</p>
                    <div id="canvasContainer"></div>
                    <div id="structureDetails" class="structure-details"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
