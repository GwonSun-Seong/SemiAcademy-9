    // --- 6. GAMIFIED QUIZ TAB ---
    const QuizTab = ({ onHoverWord, onLeaveWord, prefetchedQuiz, isPrefetching, onRegisterScore, onTriggerPrefetch, useAiQuiz, setUseAiQuiz, onOpenRanking, pdfText }) => {
      const [step, setStep] = useState('setup');
      const [configSector, setConfigSector] = useState('all');
      const [configType, setConfigType] = useState('all');
      const [configLevel, setConfigLevel] = useState('easy'); // easy, medium, hard
      
      const [questions, setQuestions] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [shortInput, setShortInput] = useState('');
      const [answersChecked, setAnswersChecked] = useState(false);
      const [quizScore, setQuizScore] = useState(0);
      
      // Load cached nickname from LocalStorage
      const [nickname, setNickname] = useState(() => localStorage.getItem('cached_nickname') || '');
      const [isScoreSaved, setIsScoreSaved] = useState(false);

      const [feedback, setFeedback] = useState({ show: false, isCorrect: false });
      const [isLoadingFirstAiQuestion, setIsLoadingFirstAiQuestion] = useState(false);
      const [isGeneratingRemaining, setIsGeneratingRemaining] = useState(false);
      const [isWaitingForRemaining, setIsWaitingForRemaining] = useState(false);

      const [speedBonuses, setSpeedBonuses] = useState({});
      const questionStartTime = useRef(Date.now());

      useEffect(() => {
        if (step === 'play') {
          questionStartTime.current = Date.now();
        }
      }, [currentIdx, step]);

      // Check top 3 scores and trigger confetti fireworks!
      useEffect(() => {
        if (step === 'result' && quizScore > 0) {
          const checkRankAndCelebrate = async () => {
            let currentLeaderboard = [];
            
            // 1. Try to fetch from Supabase
            try {
              const { data, error } = await supabase
                .from('leaderboard')
                .select('score')
                .order('score', { ascending: false })
                .limit(3);
              if (!error && data) {
                currentLeaderboard = data;
              }
            } catch (e) {
              console.warn("Supabase fetch for top 3 failed:", e);
            }
            
            // 2. Fallback to LocalStorage
            if (currentLeaderboard.length === 0) {
              try {
                const raw = localStorage.getItem('semiconductor_quiz_scores') || '[]';
                const list = JSON.parse(raw);
                list.sort((a, b) => b.score - a.score);
                currentLeaderboard = list.slice(0, 3);
              } catch (e) {}
            }
            
            // 3. Determine if current score qualifies for Top 3
            const isTop3 = currentLeaderboard.length < 3 || 
                           quizScore >= currentLeaderboard[Math.min(2, currentLeaderboard.length - 1)].score;
            
            if (isTop3) {
              // Fire confetti fireworks!
              if (typeof confetti === 'function') {
                const duration = 4 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };
                const randomInRange = (min, max) => Math.random() * (max - min) + min;

                const interval = setInterval(function() {
                  const timeLeft = animationEnd - Date.now();
                  if (timeLeft <= 0) {
                    return clearInterval(interval);
                  }
                  const particleCount = 50 * (timeLeft / duration);
                  confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                  confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                }, 250);
              }
            }
          };
          
          checkRankAndCelebrate();
        }
      }, [step, quizScore]);

      const generateAiQuizOnStart = async () => {
        setIsLoadingFirstAiQuestion(true);
        setStep('play');
        setQuestions([]);

        let sectorLabel = "전체 8대 공정 종합";
        if (configSector !== 'all') {
          const matched = PROCESS_DATA.find(p => p.id === Number(configSector));
          if (matched) sectorLabel = matched.name;
        }

        const typePrompt = configType === 'all' 
          ? "mix of multiple-choice (choice type), OX (ox type), and short-answer (short type) questions"
          : configType === 'choice'
            ? "multiple-choice (choice type) only"
            : configType === 'ox'
              ? "OX (ox type) only"
              : "short-answer (short type) only";

        let contextSource = "반도체 공학 일반 지식";
        if (pdfText) {
          contextSource = `사용자가 제공한 PDF 교재 텍스트 컨텍스트:\n${pdfText}\n`;
        }

        const prompt1 = `반도체 공정 교육용 퀴즈를 딱 1문항만 생성해 주세요.

[출제 조건]
- 선택한 공정 종류: ${sectorLabel} (${configSector === 'all' ? '전체 8대 공정 통합' : '개별 공정'})
- 문제 난이도: ${configLevel === 'hard' ? '상 (공정 트러블슈팅, 오류 추론, 파라미터 계산 등 깊이 있는 문제)' : configLevel === 'medium' ? '중 (작동 메커니즘, 장비 조건, 기법 비교 등 이해도 점검)' : '하 (용어 정의, 기본 개념 단순 암기)'}
- 퀴즈 문제 종류: ${typePrompt}
- 출제에 사용할 근거 데이터:
${contextSource}

[출력 형식 및 주의사항]
- 반드시 아래의 단일 JSON 객체 형식만 한국어로 출력해 주세요. Markdown 코드 블록(예: \`\`\`json)은 포함해도 괜찮습니다.
- 객관식(choice)의 options는 4개의 항목을 제공하고, answer는 정답 옵션의 인덱스("0", "1", "2", "3") 문자열이어야 합니다.
- OX(ox)의 options는 ["O", "X"] 이고, answer는 "O" 또는 "X" 여야 합니다.
- 주관식(short)의 options는 빈 배열 [] 이고, answer는 정확한 정답 단어여야 합니다.
- explanation에는 오답 노트 작성을 위한 친절하고 상세한 한국어 해설을 기재해 주세요.

JSON 형식 예시:
{
  "id": 1,
  "procId": ${configSector === 'all' ? 1 : Number(configSector)},
  "type": "${configType === 'all' ? 'choice' : configType}",
  "question": "웨이퍼 제조 공정 중 실리콘 단결정 덩어리를 일컫는 용어는 무엇인가?",
  "options": ["잉곳", "웨이퍼", "슬라이스", "도너"],
  "answer": "0",
  "explanation": "고순도로 정제된 실리콘 용융액으로부터 성장시킨 단결정 실리콘 원기둥 덩어리를 잉곳(Ingot)이라고 부릅니다."
}`;

        try {
          const rawText = await getGeminiResponse(prompt1);
          let raw = rawText.trim();
          const jsonMatch = raw.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            raw = jsonMatch[0];
          }
          const q1 = JSON.parse(raw);
          const preparedQ1 = prepareQuestions([q1])[0];
          
          setQuestions([preparedQ1]);
          setIsLoadingFirstAiQuestion(false);

          // Trigger background loading of the remaining 4 questions
          generateRemainingAiQuestions(sectorLabel, typePrompt, contextSource);
        } catch(err) {
          console.warn("AI 1st question generation failed, falling back to local database.", err);
          fallbackToLocalQuiz();
        }
      };

      const generateRemainingAiQuestions = async (sectorLabel, typePrompt, contextSource) => {
        setIsGeneratingRemaining(true);
        const promptRemaining = `반도체 공정 교육용 퀴즈를 추가로 4문항 생성해 주세요.

[출제 조건]
- 선택한 공정 종류: ${sectorLabel} (${configSector === 'all' ? '전체 8대 공정 통합' : '개별 공정'})
- 문제 난이도: ${configLevel === 'hard' ? '상 (공정 트러블슈팅, 오류 추론, 파라미터 계산 등 깊이 있는 문제)' : configLevel === 'medium' ? '중 (작동 메커니즘, 장비 조건, 기법 비교 등 이해도 점검)' : '하 (용어 정의, 기본 개념 단순 암기)'}
- 퀴즈 문제 종류: ${typePrompt}
- 출제에 사용할 근거 데이터:
${contextSource}

[출력 형식 및 주의사항]
- 반드시 아래의 JSON 배열 형식으로 정확하게 4개의 추가 문제를 한국어로 생성해 주세요.
- 객관식(choice)의 options는 4개의 항목을 제공하고, answer는 정답 옵션의 인덱스("0", "1", "2", "3") 문자열이어야 합니다.
- OX(ox)의 options는 ["O", "X"] 이고, answer는 "O" 또는 "X" 여야 합니다.
- 주관식(short)의 options는 [] 이고, answer는 정확한 정답 단어여야 합니다.
- explanation에는 오답 노트 작성을 위한 친절하고 상세한 한국어 해설을 기재해 주세요.

JSON 배열 구조 예시:
[
  {
    "id": 2,
    "procId": ${configSector === 'all' ? 1 : Number(configSector)},
    "type": "${configType === 'all' ? 'ox' : configType}",
    "question": "산화 공정에서 건식 산화는 습식 산화보다 산화막 성장 속도가 빠르다.",
    "options": ["O", "X"],
    "answer": "X",
    "explanation": "건식 산화는 산소 가스만을 사용하여 속도가 느리며, 습식 산화는 수증기를 이용해 5~10배 가량 빠릅니다."
  }
]`;

        try {
          const rawText = await getGeminiResponse(promptRemaining);
          let raw = rawText.trim();
          const jsonMatch = raw.match(/\[[\s\S]*\]/);
          if (jsonMatch) {
            raw = jsonMatch[0];
          }
          const parsed = JSON.parse(raw);
          const preparedRemaining = prepareQuestions(parsed);
          
          setQuestions(prev => {
            if (prev.length > 0) {
              return [prev[0], ...preparedRemaining];
            }
            return preparedRemaining;
          });
        } catch (err) {
          console.warn("Background remaining questions fetch failed.", err);
          const localSource = window.LOCAL_QUIZ_CONFIG || [];
          let matches = localSource.filter(q => 
            (configSector === 'all' || q.procId === Number(configSector)) &&
            (q.level === configLevel)
          );
          if (matches.length < 4) {
            matches = localSource.filter(q => 
              (configSector === 'all' || q.procId === Number(configSector))
            );
          }
          const selected = shuffleArray(matches).slice(0, 4);
          const adapted = selected.map(q => adaptQuestionToType(q, configType, localSource));
          const prepared = prepareQuestions(adapted);
          setQuestions(prev => {
            if (prev.length > 0) {
              return [prev[0], ...prepared];
            }
            return prepared;
          });
        } finally {
          setIsGeneratingRemaining(false);
        }
      };

      const fallbackToLocalQuiz = () => {
        setIsLoadingFirstAiQuestion(false);
        setIsGeneratingRemaining(false);
        
        const localSource = window.LOCAL_QUIZ_CONFIG || [];
        let selectedSet = [];

        if (configType === 'all') {
          let matches = localSource.filter(q => 
            (configSector === 'all' || q.procId === Number(configSector)) &&
            (q.level === configLevel)
          );
          if (matches.length < 5) {
            matches = localSource.filter(q => 
              (configSector === 'all' || q.procId === Number(configSector))
            );
          }
          if (matches.length === 0) {
            matches = [...localSource];
          }
          selectedSet = shuffleArray(matches).slice(0, 5);
        } else {
          let matches = localSource.filter(q => 
            (configSector === 'all' || q.procId === Number(configSector)) &&
            (q.level === configLevel)
          );
          if (matches.length < 5) {
            matches = localSource.filter(q => 
              (configSector === 'all' || q.procId === Number(configSector))
            );
          }
          if (matches.length === 0) {
            matches = [...localSource];
          }
          const sliced = shuffleArray(matches).slice(0, 5);
          selectedSet = sliced.map(q => adaptQuestionToType(q, configType, localSource));
        }

        setQuestions(prepareQuestions(selectedSet));
        setStep('play');
      };

      const handleStartQuiz = () => {
        setAnswersChecked(false);
        setUserAnswers({});
        setCurrentIdx(0);
        setShortInput('');
        setIsScoreSaved(false);
        setSpeedBonuses({});

        if (useAiQuiz) {
          generateAiQuizOnStart();
        } else {
          fallbackToLocalQuiz();
        }
      };

      const handleAnswerSelect = (optIdx) => {
        if (answersChecked) return;
        setUserAnswers(prev => ({ ...prev, [currentIdx]: String(optIdx) }));
        const elapsed = Date.now() - questionStartTime.current;
        setSpeedBonuses(prev => ({ ...prev, [currentIdx]: elapsed <= 3000 }));
      };

      const handleOxSelect = (answerStr) => {
        if (answersChecked) return;
        setUserAnswers(prev => ({ ...prev, [currentIdx]: answerStr }));
        const elapsed = Date.now() - questionStartTime.current;
        setSpeedBonuses(prev => ({ ...prev, [currentIdx]: elapsed <= 3000 }));
      };

      const handleShortSubmit = (e) => {
        if (e) e.preventDefault();
        if (answersChecked) return;
        setUserAnswers(prev => ({ ...prev, [currentIdx]: shortInput }));
        const elapsed = Date.now() - questionStartTime.current;
        setSpeedBonuses(prev => ({ ...prev, [currentIdx]: elapsed <= 3000 }));
      };

      const handleNextQuestion = () => {
        setShortInput('');
        if (currentIdx < questions.length - 1) {
          setCurrentIdx(prev => prev + 1);
        } else {
          // Calculate score based on difficulty multipliers
          let score = 0;
          questions.forEach((q, idx) => {
            const userAns = (userAnswers[idx] || '').trim().toLowerCase().replace(/\s+/g, '');
            const targetAns = q.answer.trim().toLowerCase().replace(/\s+/g, '');
            // Forgiving grading: exact match, or substring inclusion if type is short (min 2 chars)
            const isMatch = userAns === targetAns || 
              (q.type === 'short' && (
                (targetAns.length >= 2 && userAns.includes(targetAns)) ||
                (userAns.length >= 2 && targetAns.includes(userAns))
              ));
            if (isMatch) {
              const basePoint = configLevel === 'hard' ? 30 : configLevel === 'medium' ? 20 : 10;
              let itemScore = basePoint;
              if (speedBonuses[idx]) {
                itemScore = Math.round(basePoint * 1.2);
              }
              score += itemScore;
            }
          });
          
          setQuizScore(score);
          setStep('result');
        }
      };

      const triggerFeedbackAndNext = () => {
        if (!currentQuestion) return;
        const userAns = (userAnswers[currentIdx] || '').trim().toLowerCase().replace(/\s+/g, '');
        const targetAns = currentQuestion.answer.trim().toLowerCase().replace(/\s+/g, '');
        
        const isMatch = userAns === targetAns || 
          (currentQuestion.type === 'short' && (
            (targetAns.length >= 2 && userAns.includes(targetAns)) ||
            (userAns.length >= 2 && targetAns.includes(userAns))
          ));

        setFeedback({ show: true, isCorrect: isMatch });
      };

      const confirmFeedbackAndProceed = () => {
        setFeedback({ show: false, isCorrect: false });
        
        // If the user clicks next, but remaining AI questions are still loading in background
        if (currentIdx === questions.length - 1 && questions.length < 5 && isGeneratingRemaining) {
          setIsWaitingForRemaining(true);
          const pollForRemaining = () => {
            setQuestions(latestQuestions => {
              if (latestQuestions.length > currentIdx + 1) {
                setIsWaitingForRemaining(false);
                setCurrentIdx(prev => prev + 1);
                setShortInput('');
                return latestQuestions;
              } else {
                setTimeout(pollForRemaining, 500);
                return latestQuestions;
              }
            });
          };
          pollForRemaining();
        } else {
          handleNextQuestion();
        }
      };

      const handleSaveScore = () => {
        if (!nickname.trim()) return alert("닉네임을 입력하세요.");
        
        // Cache nickname to localstorage
        localStorage.setItem('cached_nickname', nickname.trim());
        
        onRegisterScore(nickname.trim(), quizScore, configLevel, configType, configSector);
        setIsScoreSaved(true);
        onOpenRanking(); // Automatically open ranking modal
        setStep('setup');
      };

      const currentQuestion = questions[currentIdx];
      const levelMultiplier = configLevel === 'hard' ? 3 : configLevel === 'medium' ? 2 : 1;

      return (
        <div className="flex flex-col h-full fade-in">
          {/* SETUP SCREEN */}
          {step === 'setup' && (
            <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4 space-y-4">
              <div className="shrink-0 mb-2 px-1 flex justify-between items-center">
                <div>
                  <h2 className="text-lg font-extrabold tracking-tight text-slate-100 flex items-center gap-2">
                    <span className="w-2.5 h-4 bg-violet-500 rounded-full"></span>
                    핵심 퀴즈 스테이션
                  </h2>
                  <p className="text-[11px] text-slate-400">다양한 문제 유형 및 퀴즈 출처 조율</p>
                </div>
                <button
                  onClick={onOpenRanking}
                  className="px-2.5 py-1.5 bg-slate-900 border border-slate-800 hover:border-yellow-500/50 hover:text-yellow-400 rounded-xl transition-all text-[10px] font-bold flex items-center gap-1.5 shrink-0"
                >
                  <i className="fa-solid fa-trophy text-yellow-500"></i>
                  랭킹 보기
                </button>
              </div>

              {/* Quiz Source Card */}
              <div className="bg-slate-900/60 p-4 border border-slate-800/80 rounded-2xl space-y-4">
                <h3 className="text-xs font-bold text-slate-200">1. 퀴즈 소스 선택</h3>
                <div className="grid grid-cols-2 gap-3 text-xs">
                  <button
                    onClick={() => setUseAiQuiz(false)}
                    className={`p-3 rounded-xl border font-bold text-center transition-all ${
                      !useAiQuiz 
                        ? 'bg-violet-600/15 border-violet-500 text-violet-400' 
                        : 'bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-800'
                    }`}
                  >
                    <i className="fa-solid fa-book-open text-base mb-1.5 block"></i>
                    내장 공정 백서
                  </button>
                  <button
                    onClick={() => setUseAiQuiz(true)}
                    className={`p-3 rounded-xl border font-bold text-center transition-all relative ${
                      useAiQuiz 
                        ? 'bg-violet-600/15 border-violet-500 text-violet-400' 
                        : 'bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-800'
                    }`}
                  >
                    {isPrefetching && (
                      <span className="absolute top-1 right-2 flex h-2 w-2">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                      </span>
                    )}
                    <i className="fa-solid fa-wand-magic-sparkles text-base mb-1.5 block"></i>
                    AI 맞춤형 (교재 연동)
                  </button>
                </div>
                {useAiQuiz && (
                  <p className="text-[9.5px] text-slate-400 leading-normal bg-slate-950/60 p-2 rounded-lg border border-slate-800/60">
                    💡 **AI 맞춤형**: 업로드된 PDF가 있을 경우 해당 교재를 근거로, 없을 경우 일반 반도체 지식을 바탕으로 AI가 문제를 실시간 준비합니다.
                    {isPrefetching ? (
                      <span className="text-cyan-400 font-bold block mt-1">
                        <i className="fa-solid fa-spinner fa-spin mr-1"></i>
                        백그라운드에서 AI 문제를 실시간 생성 중...
                      </span>
                    ) : (
                      <span className="text-emerald-400 font-bold block mt-1">
                        ✓ AI 문제 동기화 완료! 즉시 시작 가능합니다.
                      </span>
                    )}
                  </p>
                )}
              </div>

              {/* Filters & Difficulty Selector */}
              <div className="bg-slate-900/60 p-4 border border-slate-800/80 rounded-2xl space-y-4">
                <h3 className="text-xs font-bold text-slate-200">2. 공정 범위 및 유형 조율</h3>
                
                <div className="space-y-4">
                  {/* Category Sector */}
                  <div>
                    <label className="block text-[10px] text-slate-400 font-extrabold uppercase tracking-wide mb-1.5">출제 섹터</label>
                    <select
                      value={configSector}
                      onChange={e => setConfigSector(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 outline-none focus:border-violet-500"
                    >
                      <option value="all">8대 공정 전체 통합</option>
                      {PROCESS_DATA.map(p => (
                        <option key={p.id} value={p.id}>{p.name}</option>
                      ))}
                    </select>
                  </div>

                  {/* Question Type */}
                  <div>
                    <label className="block text-[10px] text-slate-400 font-extrabold uppercase tracking-wide mb-1.5">문제 유형</label>
                    <select
                      value={configType}
                      disabled={useAiQuiz}
                      onChange={e => setConfigType(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 outline-none focus:border-violet-500 disabled:opacity-50"
                    >
                      <option value="all">객관식 / OX / 주관식 혼합</option>
                      <option value="choice">객관식 (4지선다형)</option>
                      <option value="ox">OX 진위 판별형</option>
                      <option value="short">주관식 단답형</option>
                    </select>
                  </div>

                  {/* Difficulty Selection with multipliers */}
                  <div>
                    <label className="block text-[10px] text-slate-400 font-extrabold uppercase tracking-wide mb-1.5">배점 난이도</label>
                    <div className="grid grid-cols-3 gap-2">
                      {[
                        { val: 'easy', label: '쉬움 (x1)', desc: '기본 암기' },
                        { val: 'medium', label: '보통 (x2)', desc: '원리 이해' },
                        { val: 'hard', label: '어려움 (x3)', desc: '공정 트러블슈팅' }
                      ].map(lvl => (
                        <button
                          key={lvl.val}
                          type="button"
                          onClick={() => setConfigLevel(lvl.val)}
                          className={`py-2 px-1 rounded-xl border flex flex-col items-center justify-center transition-all ${
                            configLevel === lvl.val
                              ? 'bg-violet-600/15 border-violet-500 text-violet-400 font-bold'
                              : 'bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-800'
                          }`}
                        >
                          <span className="text-[10px]">{lvl.label}</span>
                          <span className="text-[8px] text-slate-500 font-normal mt-0.5">{lvl.desc}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <button
                onClick={handleStartQuiz}
                className="w-full py-3.5 rounded-2xl bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-extrabold text-xs tracking-wider transition-all shadow-lg active-tab-glow"
              >
                퀴즈 챌린지 시작
              </button>
            </div>
          )}

          {/* PLAY SCREEN */}
          {step === 'play' && (
            <div className="flex-1 flex flex-col justify-between min-h-0 fade-in relative">
              {isLoadingFirstAiQuestion ? (
                <div className="flex-1 flex flex-col items-center justify-center p-6 space-y-4">
                  <i className="fa-solid fa-wand-magic-sparkles text-3xl text-violet-400 animate-pulse"></i>
                  <span className="text-xs text-slate-300 font-bold text-center">첫 번째 AI 맞춤형 문제를 생성하고 있습니다...</span>
                  <div className="w-24 h-1 bg-slate-950 rounded-full overflow-hidden">
                    <div className="h-full bg-violet-500 animate-[pulse_1.5s_infinite] w-full"></div>
                  </div>
                </div>
              ) : currentQuestion ? (
                <>
                  <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4">
                    <div className="flex justify-between items-center text-[10px] text-slate-500 font-bold mb-3">
                      <span>출처: {useAiQuiz ? 'AI 실시간' : '백서 데이터'} | 배점 가중치: x{levelMultiplier}</span>
                      <span>{currentIdx + 1} / 5 문항</span>
                    </div>

                    <div className="w-full h-1 bg-slate-950 rounded-full overflow-hidden mb-5">
                      <div 
                        className="h-full bg-violet-500 transition-all duration-300"
                        style={{ width: `${((currentIdx + 1) / 5) * 100}%` }}
                      ></div>
                    </div>

                    <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-4 space-y-4">
                      <div className="flex justify-between items-center">
                        <span className="inline-block px-2.5 py-0.5 rounded-md text-[9px] font-extrabold uppercase bg-slate-950 border border-slate-800 text-violet-400">
                          {currentQuestion.type === 'ox' ? 'OX 판별' : currentQuestion.type === 'choice' ? '객관식' : '주관식 단답'}
                        </span>
                        <span className="text-[9px] text-slate-500 font-bold">문항당 {levelMultiplier * 10}점</span>
                      </div>
                      
                      <h3 className="text-xs font-bold leading-relaxed text-slate-200">
                        <InteractiveText text={currentQuestion.question} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                      </h3>

                      {/* A. CHOICE TYPE */}
                      {currentQuestion.type === 'choice' && (
                        <div className="grid grid-cols-1 gap-2 pt-2">
                          {currentQuestion.options.map((opt, oIdx) => {
                            const isSelected = userAnswers[currentIdx] === String(oIdx);
                            return (
                              <button
                                key={oIdx}
                                onClick={() => handleAnswerSelect(oIdx)}
                                className={`w-full text-left text-[11px] px-3.5 py-2.5 rounded-xl border transition-all ${
                                  isSelected 
                                    ? 'bg-violet-600/15 border-violet-500 text-violet-400 font-bold' 
                                    : 'bg-slate-950/60 border-slate-800 text-slate-300 hover:border-slate-800'
                                }`}
                              >
                                {opt}
                              </button>
                            );
                          })}
                        </div>
                      )}

                      {/* B. OX TYPE */}
                      {currentQuestion.type === 'ox' && (
                        <div className="grid grid-cols-2 gap-4 pt-3">
                          {["O", "X"].map((oxVal) => {
                            const isSelected = userAnswers[currentIdx] === oxVal;
                            return (
                              <button
                                key={oxVal}
                                onClick={() => handleOxSelect(oxVal)}
                                className={`py-6 text-2xl font-black rounded-xl border transition-all text-center ${
                                  isSelected 
                                    ? 'bg-violet-600/15 border-violet-500 text-violet-400' 
                                    : 'bg-slate-950/60 border-slate-800 text-slate-400 hover:border-slate-800'
                                }`}
                              >
                                {oxVal}
                              </button>
                            );
                          })}
                        </div>
                      )}

                      {/* C. SHORT ANSWER TYPE */}
                      {currentQuestion.type === 'short' && (
                        <form onSubmit={handleShortSubmit} className="pt-2 space-y-3">
                          <input
                            type="text"
                            placeholder="정답 단어를 입력하세요 (예: CMP, 마스크)"
                            value={shortInput}
                            onChange={e => setShortInput(e.target.value)}
                            className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-3 text-xs text-slate-100 outline-none focus:border-violet-500"
                          />
                          <button
                            type="submit"
                            className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-bold rounded-lg transition-colors"
                          >
                            입력 정답 확정
                          </button>
                          {userAnswers[currentIdx] && (
                            <div className="text-[10px] text-emerald-400 font-semibold px-1">
                              ✓ 확정된 입력값: "{userAnswers[currentIdx]}"
                            </div>
                          )}
                        </form>
                      )}
                    </div>
                  </div>

                  <div className="shrink-0 pt-2 border-t border-slate-900">
                    <button
                      onClick={triggerFeedbackAndNext}
                      disabled={!userAnswers[currentIdx] || feedback.show || isWaitingForRemaining}
                      className="w-full py-3.5 rounded-xl bg-violet-600 hover:bg-violet-500 disabled:bg-slate-900 disabled:text-slate-600 text-white font-extrabold text-xs transition-colors"
                    >
                      {currentIdx === 4 ? '채점 및 결과보기' : '다음 문항'}
                    </button>
                  </div>

                  {/* 3D Wafer Feedback Overlay */}
                  {feedback.show && (
                    <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-md z-30 flex flex-col items-center p-4 overflow-y-auto custom-scrollbar space-y-4 rounded-2xl fade-in justify-between">
                      <div className="w-full flex-1 flex flex-col items-center justify-center space-y-4 min-h-0">
                        <div className="wafer-3d-container scale-[0.65] -my-4 shrink-0">
                          <div className="wafer-3d">
                            <div className="wafer-grid"></div>
                            <div className="wafer-notch"></div>
                            <div className="wafer-reflection"></div>
                          </div>
                        </div>
                        
                        <div className={`px-4 py-2 rounded-xl text-xs font-black border tracking-wider shadow-lg shrink-0 ${
                          feedback.isCorrect 
                            ? 'bg-emerald-950/90 text-emerald-400 border-emerald-500/40 shadow-emerald-500/20 animate-feedback-correct' 
                            : 'bg-rose-950/90 text-rose-400 border-rose-500/40 shadow-rose-500/20 animate-feedback-incorrect'
                        }`}>
                          {feedback.isCorrect ? (
                            <span className="flex flex-col items-center gap-1">
                              <span className="flex items-center gap-1.5">
                                <i className="fa-solid fa-circle-check text-sm text-emerald-400"></i>
                                정답입니다! (+{speedBonuses[currentIdx] ? Math.round(levelMultiplier * 10 * 1.2) : levelMultiplier * 10}점)
                              </span>
                              {speedBonuses[currentIdx] && (
                                <span className="text-[10px] text-yellow-400 font-extrabold flex items-center gap-1 mt-0.5 animate-pulse">
                                  <i className="fa-solid fa-bolt text-yellow-400"></i>
                                  ⚡ 3초 퀵 보너스 적용! (+20%)
                                </span>
                              )}
                            </span>
                          ) : (
                            <span className="flex items-center gap-1.5 flex-col items-center text-center">
                              <span className="flex items-center gap-1.5">
                                <i className="fa-solid fa-circle-xmark text-sm text-rose-400"></i>
                                오답입니다!
                              </span>
                              <span className="text-[10px] text-rose-300 font-semibold mt-1">
                                정답: {currentQuestion.type === 'choice' ? currentQuestion.options[Number(currentQuestion.answer)] : currentQuestion.answer}
                              </span>
                            </span>
                          )}
                        </div>

                        {/* Detailed Explanation Study Card */}
                        <div className="w-full bg-slate-900/90 border border-slate-800/80 rounded-xl p-3 text-[11px] leading-relaxed text-slate-300 max-h-48 overflow-y-auto custom-scrollbar select-text">
                          <div className="font-extrabold text-cyan-400 mb-1 flex items-center gap-1 shrink-0">
                            <i className="fa-solid fa-book-open text-[10px]"></i>
                            핵심 해설 학습
                          </div>
                          <InteractiveText text={currentQuestion.explanation} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                        </div>
                      </div>

                      <div className="w-full shrink-0 pt-2 border-t border-slate-900/80">
                        <button
                          onClick={confirmFeedbackAndProceed}
                          className="w-full py-3 rounded-xl bg-violet-600 hover:bg-violet-500 text-white font-extrabold text-xs transition-colors flex items-center justify-center gap-1.5 shadow-lg active-tab-glow"
                        >
                          공부 완료 & 다음 문항
                          <i className="fa-solid fa-chevron-right text-[10px]"></i>
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Real-time background loading wait indicator */}
                  {isWaitingForRemaining && (
                    <div className="absolute inset-0 bg-slate-950/85 backdrop-blur-sm z-30 flex flex-col items-center justify-center space-y-4 rounded-2xl fade-in">
                      <i className="fa-solid fa-spinner fa-spin text-2xl text-cyan-400"></i>
                      <span className="text-xs text-slate-300 font-bold text-center">다음 AI 문제를 실시간으로 받아오고 있습니다...</span>
                    </div>
                  )}
                </>
              ) : null}
            </div>
          )}

          {/* RESULT SCREEN */}
          {step === 'result' && (
            <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4 space-y-5 fade-in">
              <div className="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-5 text-center space-y-3">
                <div className="w-16 h-16 mx-auto rounded-full bg-violet-500/10 flex items-center justify-center border border-violet-500/30">
                  <i className="fa-solid fa-trophy text-2xl text-violet-400"></i>
                </div>
                <div className="text-xs text-slate-400 font-bold uppercase tracking-widest">종합 스코어</div>
                <div className="text-3xl font-black text-slate-100">{quizScore}점</div>
                <p className="text-[10px] text-slate-500 leading-relaxed">
                  난이도 <strong>{configLevel === 'hard' ? '어려움 (30점x5)' : configLevel === 'medium' ? '보통 (20점x5)' : '쉬움 (10점x5)'}</strong> 설정이 적용되었습니다.
                </p>
              </div>

              {/* Save Score Card */}
              {!isScoreSaved ? (
                <div className="bg-slate-900/60 p-4 border border-slate-800/80 rounded-2xl space-y-3">
                  <h3 className="text-xs font-bold text-slate-200">명예의 전당 등록</h3>
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      placeholder="닉네임 입력 (예: 반도체천재)"
                      value={nickname}
                      onChange={e => setNickname(e.target.value)}
                      className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-100 outline-none focus:border-violet-500"
                    />
                    <button
                      onClick={handleSaveScore}
                      className="bg-violet-600 hover:bg-violet-500 text-white font-bold px-4 py-2 rounded-xl text-xs transition-colors"
                    >
                      등록 및 확인
                    </button>
                  </div>
                </div>
              ) : (
                <div className="bg-emerald-950/20 border border-emerald-800/40 text-emerald-400 p-3 rounded-xl text-xs font-bold text-center">
                  ✓ 점수가 명예의 전당에 등재되었습니다.
                </div>
              )}

              {/* Wrong Questions review list */}
              <div className="space-y-3">
                <h3 className="text-xs font-bold text-slate-200 px-1">오답 정리 노트 및 해설</h3>
                {questions.map((q, idx) => {
                  const userAns = (userAnswers[idx] || '').trim().toLowerCase().replace(/\s+/g, '');
                  const targetAns = q.answer.trim().toLowerCase().replace(/\s+/g, '');
                  const isCorrect = userAns === targetAns;

                  return (
                    <div key={q.id || idx} className={`p-4 rounded-xl border ${isCorrect ? 'bg-slate-900/10 border-slate-800/50' : 'bg-rose-950/10 border-rose-800/30'}`}>
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-[9.5px] font-bold text-slate-500">문항 {idx + 1}</span>
                        <span className={`text-[9.5px] font-extrabold ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}`}>
                          {isCorrect ? '정답' : '오답'}
                        </span>
                      </div>
                      <p className="text-xs text-slate-300 font-semibold mb-2">{q.question}</p>
                      <div className="text-[10px] text-slate-400 leading-normal space-y-1">
                        <div>내 제출: <span className={isCorrect ? 'text-emerald-400' : 'text-rose-400'}>{userAnswers[idx] || '(미입력)'}</span></div>
                        <div>올바른 답: <span className="text-emerald-400">{q.answer}</span></div>
                        <div className="mt-2 text-slate-500 border-t border-slate-800/60 pt-1">
                          <InteractiveText text={q.explanation} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <button
                onClick={() => setStep('setup')}
                className="w-full py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold transition-colors"
              >
                메인 세팅 화면으로 이동
              </button>
            </div>
          )}
        </div>
      );
    };

    // --- 7. SUPABASE COMMUNITY FORUM TAB COMPONENT ---
    const CommunityTab = () => {
      const [posts, setPosts] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [isWriting, setIsWriting] = useState(false);

      // Cache nickname loader
      const [nickname, setNickname] = useState(() => localStorage.getItem('cached_nickname') || '');
      const [password, setPassword] = useState('');
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');

      const fetchPosts = async () => {
        setIsLoading(true);
        try {
          const { data, error } = await supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          setPosts(data || []);
        } catch(e) {
          console.error("Supabase 로드 오류:", e.message);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchPosts();
      }, []);

      const handleAddPost = async (e) => {
        e.preventDefault();
        if (!nickname.trim() || !password.trim() || !title.trim() || !content.trim()) {
          return alert("모든 항목을 입력해 주세요.");
        }

        try {
          const { error } = await supabase
            .from('posts')
            .insert([{ nickname: nickname.trim(), password: password.trim(), title, content }]);

          if (error) throw error;

          // Cache nickname to localstorage
          localStorage.setItem('cached_nickname', nickname.trim());

          setPassword('');
          setTitle('');
          setContent('');
          setIsWriting(false);
          fetchPosts();
          alert("게시글이 성공적으로 등록되었습니다!");
        } catch(e) {
          alert(`등록 실패: ${e.message}`);
        }
      };

      const handleDeletePost = async (postId, postPassword) => {
        const inputPassword = prompt("게시글 삭제 비밀번호를 입력하세요:");
        if (inputPassword === null) return;

        if (inputPassword.trim() !== postPassword.trim()) {
          return alert("비밀번호가 일치하지 않습니다.");
        }

        try {
          const { error } = await supabase
            .from('posts')
            .delete()
            .eq('id', postId)
            .eq('password', inputPassword.trim());

          if (error) throw error;
          fetchPosts();
          alert("게시글이 삭제되었습니다.");
        } catch(e) {
          alert(`삭제 오류: ${e.message}`);
        }
      };

      return (
        <div className="flex flex-col h-full fade-in">
          {/* Header */}
          <div className="shrink-0 mb-3 px-1 flex justify-between items-center">
            <div>
              <h2 className="text-lg font-extrabold tracking-tight text-slate-100 flex items-center gap-2">
                <i className="fa-solid fa-clipboard-list text-emerald-400"></i>
                자유게시판
              </h2>
              <p className="text-[11px] text-slate-400">학습 질문 및 자유로운 반도체 관련 토론 공간</p>
            </div>
            
            <button
              onClick={() => setIsWriting(!isWriting)}
              className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-xl transition-all text-xs font-bold flex items-center gap-1 shrink-0"
            >
              <i className={`fa-solid ${isWriting ? 'fa-list' : 'fa-pen'}`}></i>
              {isWriting ? '목록 보기' : '새 글 작성'}
            </button>
          </div>

          <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-0.5">
            {isWriting ? (
              <form onSubmit={handleAddPost} className="bg-slate-900/60 p-4 border border-slate-800/80 rounded-2xl space-y-4 fade-in">
                <div>
                  <h3 className="text-xs font-bold text-slate-200">새 게시물 등록</h3>
                  <p className="text-[10px] text-slate-400 mt-1">💡 별도의 회원가입/로그인 없이, 닉네임과 임의의 삭제용 비밀번호 설정만으로 간편하게 게시글을 작성하실 수 있습니다.</p>
                </div>
                <div className="grid grid-cols-2 gap-3 text-xs">
                  <div>
                    <label className="block text-[10px] text-slate-500 font-bold mb-1">작성자 닉네임</label>
                    <input 
                      type="text" 
                      placeholder="닉네임"
                      value={nickname}
                      onChange={e => setNickname(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 outline-none focus:border-emerald-500"
                    />
                  </div>
                  <div>
                    <label className="block text-[10px] text-slate-500 font-bold mb-1">삭제용 비밀번호</label>
                    <input 
                      type="password" 
                      placeholder="비밀번호"
                      value={password}
                      onChange={e => setPassword(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 outline-none focus:border-emerald-500"
                    />
                  </div>
                </div>

                <div className="text-xs">
                  <label className="block text-[10px] text-slate-500 font-bold mb-1">글 제목</label>
                  <input 
                    type="text" 
                    placeholder="제목을 입력하세요"
                    value={title}
                    onChange={e => setTitle(e.target.value)}
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-100 outline-none focus:border-emerald-500"
                  />
                </div>

                <div className="text-xs">
                  <label className="block text-[10px] text-slate-500 font-bold mb-1">본문 내용</label>
                  <textarea 
                    rows="5"
                    placeholder="내용을 작성하세요..."
                    value={content}
                    onChange={e => setContent(e.target.value)}
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-slate-100 outline-none focus:border-emerald-500 custom-scrollbar resize-none"
                  ></textarea>
                </div>

                <button
                  type="submit"
                  className="w-full py-3 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold text-xs transition-colors"
                >
                  게시판 등록 완료
                </button>
              </form>
            ) : (
              <div className="space-y-3 pb-4">
                {isLoading ? (
                  <div className="h-44 flex flex-col items-center justify-center text-slate-500 text-xs gap-2">
                    <i className="fa-solid fa-spinner fa-spin text-lg text-emerald-400"></i>
                    <span>게시물을 동기화하는 중...</span>
                  </div>
                ) : posts.length === 0 ? (
                  <div className="h-44 flex flex-col items-center justify-center text-slate-500 text-xs border border-dashed border-slate-800 rounded-2xl bg-slate-900/10 p-4 text-center">
                    <i className="fa-solid fa-clipboard-list text-2xl mb-2 text-slate-700"></i>
                    <span>자유게시판에 등록된 글이 없습니다.</span>
                  </div>
                ) : (
                  posts.map(post => (
                    <div key={post.id} className="bg-slate-900/30 border border-slate-800/60 rounded-2xl p-4 space-y-2 relative group hover:border-slate-700 transition-colors">
                      <button
                        onClick={() => handleDeletePost(post.id, post.password)}
                        className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-500 hover:text-rose-400 transition-opacity text-xs"
                        title="게시글 삭제"
                      >
                        <i className="fa-solid fa-trash-can"></i>
                      </button>

                      <h3 className="text-xs font-bold text-slate-200 pr-8">{post.title}</h3>
                      <p className="text-[11px] text-slate-400 leading-relaxed white-space-pre-wrap">{post.content}</p>
                      
                      <div className="flex items-center gap-2 text-[9px] text-slate-500 font-semibold pt-1 border-t border-slate-900">
                        <span className="text-slate-400"><i className="fa-solid fa-user-graduate mr-1"></i>{post.nickname}</span>
                        <span>•</span>
                        <span>{new Date(post.created_at).toLocaleString('ko-KR', { hour12: false })}</span>
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 10. SEMICONDUCTOR HISTORY TIMELINE TAB ---
    const HistoryTab = ({ onHoverWord, onLeaveWord }) => {
      const historyData = [
        {
          year: "1947",
          title: "트랜지스터 발명 (벨 연구소)",
          desc: "존 바딘, 월터 브래튼, 윌리엄 쇼클리가 점접촉형 트랜지스터를 최초로 발명하며 진공관을 대체하고 현대 반도체 공학의 신호탄을 쏘아 올렸습니다.",
          icon: "fa-toggle-on",
          color: "border-cyan-500 text-cyan-400 shadow-cyan-500/20"
        },
        {

          icon: "fa-microchip",
          color: "border-teal-500 text-teal-400 shadow-teal-500/20"
        },
        {

        },
        {

        },
        {

          title: "인텔 4004 마이크로프로세서",

        {

          icon: "fa-cubes",
          color: "border-purple-500 text-purple-400 shadow-purple-500/20"
        },
        {
          year: "2011",
          title: "FinFET 최초 양산 적용 (22nm)",
          desc: "인텔이 Ivy Bridge CPU 라인업에 22nm 공정 기반 Tri-Gate(FinFET) 기술을 최초로 상용 양산 도입하며, 나노 공정에서의 누설 전류 차단 한계를 넘겼습니다.",
