      {

        desc: "포토 공정을 통해 표면에 전사된 감광막(PR) 패턴의 보호 아래, 하부 박막 영역을 물리·화학적 메커니즘으로 깎아내어 타겟 회로 구조를 물리적으로 조각해 내는 감량 제조 공정입니다.\n\n1. 식각 특성 비교:\n- 등방성 식각 (Isotropic Etching): 화학적 식각액(Wet chemical)을 사용하는 습식 식각이 대표적입니다. 모든 방향으로 균일하게 깎이기 때문에 마스크 가장자리 아래쪽까지 갉아먹는 언더컷(Undercut) 현상이 심해 선폭 3um 이하의 미세 공정에는 제한적으로만 사용됩니다.\n- 이방성 식각 (Anisotropic Etching): 플라즈마 상태의 반응 가스를 챔버에서 이온화하고 전기장으로 직진 가속하는 건식 식각이 대표적입니다. 수직 방향으로 강하게 타격을 주어 패턴의 벽면을 경사 없이 직각 프로파일로 깎아냅니다.\n\n2. 반응성 이온 식각 (RIE, Reactive Ion Etching):\n현대 건식 식각은 단순히 물리적으로 이온 충돌만 주는 스퍼터 에칭(Physical sputtering)과 화학적으로 라디칼 반응만 유도하는 플라즈마 에칭의 장점을 융합한 RIE를 주로 씁니다. 가속된 활성 이온이 타격하여 하부 화학 반응 속도를 촉진(Ion-assisted)하기 때문에 이방성과 빠른 식각 속도를 동시에 달성합니다.\n\n3. 선택비 (Selectivity): 하부 박막을 깎는 동안 장벽 역할을 하는 감광막(PR)이나 정지 절연막(Etch Stop layer)이 지탱해야 하는 강도의 비율로, 높은 선택비를 얻는 가스 조합과 유량 제어가 미세 패턴 형성의 핵심입니다.",

        try {
          const bodyObj = typeof payloadOrText === 'string'
            ? { contents: [{ parts: [{ text: payloadOrText }] }] }
            : payloadOrText;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${userKey.trim()}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyObj)
          });

          if (!response.ok) {
            let errDetail = `Status: ${response.status} (${response.statusText})`;

              errDetail += `\nMessage: ${errJson?.error?.message || 'Unknown'}`;

            window.dispatchEvent(new CustomEvent('open-api-key-modal'));
            throw new Error(`[개인 API 키 오류] ${errDetail}`);

        }
      }

      // 2. Fallback: Default rotated keys
      const keys = window.GEMINI_API_KEYS || [];
      const maxAttempts = Math.max(1, keys.length);
      
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const apiKey = getGeminiApiKey();
        try {
          const bodyObj = typeof payloadOrText === 'string'
            ? { contents: [{ parts: [{ text: payloadOrText }] }] }
            : payloadOrText;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyObj)
          });

          const isQuotaError = response.status === 429;
          let errDetail = "";

          if (!response.ok) {
            errDetail = `Status: ${response.status} (${response.statusText})`;
            try {
              errJson = await response.json();
              errDetail += `\nMessage: ${errJson?.error?.message || 'Unknown'}`;
            } catch(e) {}
          }

          const isMessageQuotaError = errJson?.error?.message?.toLowerCase().includes("quota") || 
                                      errJson?.error?.message?.toLowerCase().includes("resource_exhausted") ||
                                      errJson?.error?.status === "RESOURCE_EXHAUSTED";

          if (isQuotaError || isMessageQuotaError) {
            if (keys.length > 1 && attempt < keys.length - 1) {
              console.warn(`[API Key Failover] Key index ${currentKeyIndex} exhausted (Quota/Rate Limit). Retrying with next key...`);
              currentKeyIndex++;

          if (!response.ok) {

          const resData = errJson || await response.json();
          return resData?.candidates?.[0]?.content?.parts?.[0]?.text || '';
        } catch (err) {

                                     err.message?.toLowerCase().includes("429");
          if (isRateLimitOrQuota && keys.length > 1 && attempt < keys.length - 1) {
            console.warn(`[API Key Failover] Error encountered: ${err.message}. Retrying with next key...`);
            currentKeyIndex++;
            continue;
          }
          console.error("Gemini AI API 호출 중 오류 발생:", err);
          throw err;
        }
      }
    };

    // New helper for SSE streaming responses from Gemini API with automatic key failover
    const getGeminiResponseStream = async (payloadOrText, onChunk, onError) => {
      // 1. Check if user set a personal API key in LocalStorage
      const userKey = localStorage.getItem('user_gemini_api_key');
      if (userKey && userKey.trim()) {
        try {
          const bodyObj = typeof payloadOrText === 'string'
            ? { contents: [{ parts: [{ text: payloadOrText }] }] }
            : payloadOrText;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:streamGenerateContent?key=${userKey.trim()}&alt=sse`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyObj)
          });

          if (!response.ok) {
            let errDetail = `Status: ${response.status} (${response.statusText})`;
            try {
              const errJson = await response.json();
              errDetail += `\nMessage: ${errJson?.error?.message || 'Unknown'}`;
            } catch(e) {}
            window.dispatchEvent(new CustomEvent('open-api-key-modal'));
            throw new Error(`[개인 API 키 스트리밍 오류] ${errDetail}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            
            const lines = buffer.split("\n");
            buffer = lines.pop();
            
            for (const line of lines) {
              const trimmedLine = line.trim();
              if (trimmedLine.startsWith("data: ")) {
                const dataStr = trimmedLine.slice(6).trim();
                if (dataStr) {
                  try {
                    const parsed = JSON.parse(dataStr);
                    const chunkText = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    if (chunkText) {
                      onChunk(chunkText);
                    }
                  } catch(e) {}
                }
              }
            }
          }
          return;
        } catch (err) {
          console.error("개인 Gemini AI API 스트리밍 호출 중 오류 발생:", err);
          onError(err);
          return;
        }
      } else {
        const keys = window.GEMINI_API_KEYS || [];
        if (keys.length === 0 || (keys.length === 1 && keys[0].includes("Dummy"))) {
          const errMsg = new Error("개인 API 키가 등록되지 않았습니다. 상단 헤더(모바일) 또는 좌측 사이드바(데스크톱)의 '🔑 API 키' 설정 버튼을 눌러 Google AI Studio에서 무료 API 키를 발급받아 등록해 주세요.");
          window.dispatchEvent(new CustomEvent('open-api-key-modal'));
          onError(errMsg);
          return;
        }
      }

      // 2. Fallback: Default rotated keys
      const keys = window.GEMINI_API_KEYS || [];
      const maxAttempts = Math.max(1, keys.length);

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const apiKey = getGeminiApiKey();
        try {
          const bodyObj = typeof payloadOrText === 'string'
            ? { contents: [{ parts: [{ text: payloadOrText }] }] }
            : payloadOrText;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:streamGenerateContent?key=${apiKey}&alt=sse`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyObj)
          });

          const isQuotaError = response.status === 429;
          let errDetail = "";
          let errJson = null;

          if (!response.ok) {
            errDetail = `Status: ${response.status} (${response.statusText})`;
            try {
              errJson = await response.json();
              errDetail += `\nMessage: ${errJson?.error?.message || 'Unknown'}`;
            } catch(e) {}
          }

          const isMessageQuotaError = errJson?.error?.message?.toLowerCase().includes("quota") || 
                                      errJson?.error?.message?.toLowerCase().includes("resource_exhausted") ||
                                      errJson?.error?.status === "RESOURCE_EXHAUSTED";

          if (isQuotaError || isMessageQuotaError) {
            if (keys.length > 1 && attempt < keys.length - 1) {
              console.warn(`[API Key Failover] Streaming Key index ${currentKeyIndex} exhausted (Quota/Rate Limit). Retrying with next key...`);
              currentKeyIndex++;
              continue;
            }
          }

          if (!response.ok) {
            throw new Error(errDetail);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            
            const lines = buffer.split("\n");
            buffer = lines.pop(); // Keep incomplete line in buffer
            
            for (const line of lines) {
              const trimmedLine = line.trim();
              if (trimmedLine.startsWith("data: ")) {
                const dataStr = trimmedLine.slice(6).trim();
                if (dataStr) {
                  try {
                    const parsed = JSON.parse(dataStr);
                    const chunkText = parsed?.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    if (chunkText) {
                      onChunk(chunkText);
                    }
                  } catch(e) {
                    // Partial/invalid JSON can occur, ignore
                  }
                }
              }
            }
          }
          return; // Success, exit
        } catch (err) {
          const isRateLimitOrQuota = err.message?.toLowerCase().includes("quota") || 
                                     err.message?.toLowerCase().includes("exhausted") ||
                                     err.message?.toLowerCase().includes("429");
          if (isRateLimitOrQuota && keys.length > 1 && attempt < keys.length - 1) {
            console.warn(`[API Key Failover] Streaming error encountered: ${err.message}. Retrying with next key...`);
            currentKeyIndex++;
            continue;
          }
          console.error("Gemini AI API 스트리밍 호출 중 오류 발생:", err);
          onError(err);
          return;
        }
      }
    };

    // Helper to perform Fisher-Yates array shuffle
    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    // Helper to shuffle both the order of questions and their answer choices (if multiple-choice)
    const prepareQuestions = (rawQuestions) => {
      const shuffledList = shuffleArray(rawQuestions);
      return shuffledList.map(q => {
        if (q.type === 'choice' && Array.isArray(q.options) && q.options.length > 0) {
          // Map options to keep track of their original indices
          const optionsWithIdx = q.options.map((opt, idx) => ({ text: opt, originalIndex: String(idx) }));
          const shuffledOptions = shuffleArray(optionsWithIdx);
          
          // Re-calculate the correct answer's new index
          const newAnswerIndex = shuffledOptions.findIndex(item => item.originalIndex === q.answer);
          
          return {
            ...q,
            options: shuffledOptions.map(item => item.text),
            answer: String(newAnswerIndex === -1 ? q.answer : newAnswerIndex)
          };
        }
        return q;
      });
    };

    // Helper to dynamically adapt a question to a target type (choice, ox, short)
    const adaptQuestionToType = (q, targetType, allQuestions) => {
      if (!q) return q;
      if (q.type === targetType) return { ...q };

      const getDistractorsForShort = (correctAnswer) => {
        const candidates = allQuestions
          .filter(item => item.id !== q.id)
          .map(item => {
            if (item.type === 'short') return item.answer;
            if (item.type === 'choice' && Array.isArray(item.options)) {
              const correctIdx = Number(item.answer);
              return item.options[correctIdx];
            }
            return null;
          })
          .filter(ans => ans && ans.trim().toLowerCase() !== correctAnswer.trim().toLowerCase());
        
        const unique = [...new Set(candidates)];
        return shuffleArray(unique).slice(0, 3);
      };

      const cleanTextForEnd = (txt) => {
        return txt.trim().replace(/[.?]$/, '');
      };

      const cleanChoiceAnswer = (text) => {
        if (!text) return '';
        let cleaned = text.replace(/\([^)]*\)/g, '').trim();
        cleaned = cleaned.replace(/(공법|공정|장비|기법|원리|현상)$/, '').trim();
        return cleaned || text;
      };

      // 1. Target: CHOICE
      if (targetType === 'choice') {
        if (q.type === 'ox') {
          return {
            ...q,
            type: 'choice',
            options: ["그렇다 (O / 참)", "그렇지 않다 (X / 거짓)"],
            answer: q.answer.toUpperCase() === 'O' ? "0" : "1",
            question: `다음 설명의 진위여부로 올바른 것은 무엇입니까?\n\n"${q.question}"`
          };
        } else if (q.type === 'short') {
          const distractors = getDistractorsForShort(q.answer);
          while (distractors.length < 3) {
            distractors.push("해당 없음", "기타 공정 변수", "이물질 결함");
          }
          const options = [q.answer, ...distractors.slice(0, 3)];
          return {
            ...q,
            type: 'choice',
            options: options,
            answer: "0" // Will be shuffled by prepareQuestions
          };
        }
      }

      // 2. Target: OX
      if (targetType === 'ox') {
        const isCorrect = Math.random() > 0.5;
        if (q.type === 'choice') {
          const correctIdx = Number(q.answer);
          const correctText = q.options[correctIdx];
          if (isCorrect) {
            return {
              ...q,
              type: 'ox',
              options: ["O", "X"],
              answer: "O",
              question: `다음 설명이 맞는지 판별하십시오.\n\n"${cleanTextForEnd(q.question)}의 올바른 답은 '${correctText}'이다."`
            };
          } else {
            const wrongIndices = q.options.map((_, i) => i).filter(i => i !== correctIdx);
            const wrongIdx = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
            const wrongText = q.options[wrongIdx];
            return {
              ...q,
              type: 'ox',
              options: ["O", "X"],
              answer: "X",
              question: `다음 설명이 맞는지 판별하십시오.\n\n"${cleanTextForEnd(q.question)}의 올바른 답은 '${wrongText}'이다."`
            };
          }
        } else if (q.type === 'short') {
          if (isCorrect) {
            return {
              ...q,
              type: 'ox',
              options: ["O", "X"],
              answer: "O",
              question: `다음 설명이 맞는지 판별하십시오.\n\n"${cleanTextForEnd(q.question)}에 대한 올바른 명칭은 '${q.answer}'이다."`
            };
          } else {
            const distractors = getDistractorsForShort(q.answer);
            const wrongText = distractors[0] || "잘못된 공정 용어";
            return {
              ...q,
              type: 'ox',
              options: ["O", "X"],
              answer: "X",
              question: `다음 설명이 맞는지 판별하십시오.\n\n"${cleanTextForEnd(q.question)}에 대한 올바른 명칭은 '${wrongText}'이다."`
            };
          }
        }
      }

      // 3. Target: SHORT
      if (targetType === 'short') {
        if (q.type === 'choice') {
          const correctIdx = Number(q.answer);
          const correctText = q.options[correctIdx];
          const cleanedAns = cleanChoiceAnswer(correctText);
          return {
            ...q,
            type: 'short',
            options: [],
            answer: cleanedAns,
            question: `${q.question} (보기 없이 주관식 단답으로 입력하세요. 힌트: ${cleanedAns.length}글자)`
          };
        } else if (q.type === 'ox') {
          return {
            ...q,
            type: 'short',
            options: [],
            answer: q.answer,
            question: `${q.question} (O 또는 X로 입력하세요)`
          };
        }
      }

      return { ...q };
    };

    // --- 2. INTERACTIVE TEXT WRAPPER COMPONENT ---
    const InteractiveText = ({ text, onHoverWord, onLeaveWord }) => {
      if (!text) return null;
      
      const terms = Object.keys(GLOSSARY_DB);
      const regex = new RegExp(`(${terms.join('|')})`, 'g');
      const parts = text.split(regex);
      
      return (
        <span>
          {parts.map((part, idx) => {
            if (terms.includes(part)) {
              return (
                <span 
                  key={idx}
                  className="term-highlight font-bold"
                  onMouseEnter={(e) => onHoverWord(part, e)}
                  onMouseLeave={onLeaveWord}
                >
                  {part}
                </span>
              );
            }
            return part;
          })}
        </span>
      );
    };

    // --- 3. HIDING PDF UPLOAD: POPUP MODAL COMPONENT ---
    const PROCESS_KEYWORDS = {
      "1": ["웨이퍼", "실리콘", "단결정", "잉곳", "슬라이스", "폴리싱", "쵸크랄스키", "CZ", "wafer", "ingot"],
      "2": ["산화", "절연막", "sio₂", "열산화", "건식", "습식", "oxidation", "oxide"],
      "3": ["포토", "감광", "노광", "pr", "현상", "euv", "마스크", "asml", "photolithography", "exposure"],
      "4": ["식각", "플라즈마", "rie", "이방성", "등방성", "에칭", "etch", "etching"],
      "5": ["박막", "증착", "cvd", "ald", "pvd", "스퍼터링", "커버리지", "deposition", "film"],
      "6": ["금속", "배선", "다마신", "텅스텐", "구리", "도금", "em", "metallization", "copper"],
      "7": ["테스트", "eds", "프로브", "수율", "리페어", "퓨즈", "yield", "test", "probe"],
      "8": ["패키징", "다이싱", "본딩", "tsv", "hbm", "몰딩", "emc", "ncf", "packaging", "package"]
    };

    const filterTextByKeywords = (text, keywords) => {
      if (!keywords || keywords.length === 0) return text;
      const paragraphs = text.split(/\n+/);
      const filtered = paragraphs.filter(para => {
        const lowerPara = para.toLowerCase();
        return keywords.some(keyword => lowerPara.includes(keyword.toLowerCase()));
      });
      return filtered.join("\n\n");
    };

    const PdfUploadModal = ({ isOpen, onClose, pdfText, setPdfText, onTriggerPrefetch }) => {
      const [isPdfLoading, setIsPdfLoading] = useState(false);
      const [step, setStep] = useState('select_file'); // select_file, configure
      const [pdfDoc, setPdfDoc] = useState(null);
      const [totalPages, setTotalPages] = useState(0);
      const [fileName, setFileName] = useState('');
      const [docScope, setDocScope] = useState('all'); // all, specific
      const [selectedSector, setSelectedSector] = useState('1');
      const [startPage, setStartPage] = useState(1);
      const [endPage, setEndPage] = useState(1);
      const [useSmartFilter, setUseSmartFilter] = useState(false);
      
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
          setStep('select_file');
          setPdfDoc(null);
          setFileName('');
          setTotalPages(0);
          setDocScope('all');
          setSelectedSector('1');
          setStartPage(1);
          setEndPage(1);
          setUseSmartFilter(false);
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const handleFileSelected = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsPdfLoading(true);

        try {
          const fileReader = new FileReader();
          fileReader.readAsArrayBuffer(file);
          fileReader.onload = async () => {
            try {
              const arrayBuffer = fileReader.result;
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              
              setPdfDoc(pdf);
              setTotalPages(pdf.numPages);
              setFileName(file.name);
              setStartPage(1);
              setEndPage(pdf.numPages);
              setStep('configure');
            } catch(innerErr) {
              alert(`PDF 파일 분석 실패: ${innerErr.message}`);
              if (fileInputRef.current) fileInputRef.current.value = "";
            } finally {
              setIsPdfLoading(false);
            }
          };
        } catch (err) {
          alert(`파일 읽기 오류: ${err.message}`);
          setIsPdfLoading(false);
        }
      };

      const handleExtractText = async () => {
        if (!pdfDoc) return;
        
        const start = parseInt(startPage, 10);
        const end = parseInt(endPage, 10);
        
        if (isNaN(start) || isNaN(end) || start < 1 || end > totalPages || start > end) {
          alert(`올바른 페이지 범위를 입력해 주세요. (1 ~ ${totalPages} 사이)`);
          return;
        }

        setIsPdfLoading(true);
        try {
          let fullText = "";
          for (let i = start; i <= end; i++) {
            const page = await pdfDoc.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(" ");
            fullText += pageText + "\n";
          }

          if (fullText.trim().length === 0) {
            throw new Error("지정한 페이지 범위 내에서 텍스트를 추출하지 못했습니다.");
          }

          let processedText = fullText;
          let filterApplied = false;

          if (docScope === 'specific' && useSmartFilter) {
            const keywords = PROCESS_KEYWORDS[selectedSector];
            const filtered = filterTextByKeywords(fullText, keywords);
            if (filtered.trim().length > 0) {
              processedText = filtered;
              filterApplied = true;
            } else {
              alert(`선택하신 공정 키워드(예: ${keywords.slice(0, 3).join(', ')})가 포함된 단락을 찾지 못해 전체 페이지 내용을 추출합니다.`);
            }
          }

          const finalSlicedText = processedText.slice(0, 10000);
          setPdfText(finalSlicedText);
          onTriggerPrefetch(finalSlicedText);

          let alertMsg = `PDF 분석 완료! (${start} ~ ${end} 페이지)\n`;
          if (filterApplied) {
            alertMsg += `✨ 스마트 필터 가동: 선택 공정 키워드 관련 핵심 내용만 필터링하여 압축 추출했습니다. (토큰 절약)`;
          } else {
            alertMsg += `전체 본문 텍스트가 정상 추출되었습니다.`;
          }
          alert(alertMsg);
          onClose();
        } catch (err) {
          alert(`텍스트 추출 오류: ${err.message}`);
        } finally {
          setIsPdfLoading(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-900 border border-slate-800/80 rounded-2xl w-full max-w-sm p-5 shadow-2xl relative fade-in">
            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-200">✕</button>
            <h3 className="text-sm font-bold text-slate-100 flex items-center gap-1.5 mb-2">
              <i className="fa-solid fa-file-pdf text-cyan-400"></i>
              학습용 교재 PDF 연동 설정
            </h3>

            {step === 'select_file' ? (
              <>
                <p className="text-[10.5px] text-slate-400 mb-4 leading-relaxed">
                  반도체 공정 관련 PDF 파일(논문, 강의자료 등)을 업로드하면 브라우저 내에서 텍스트를 자동 파싱하여 AI 질의 및 퀴즈 출제 지식으로 연동합니다.
                </p>

                <div className="space-y-3">
                  <input 
                    type="file" 
                    ref={fileInputRef} 
                    accept="application/pdf" 
                    onChange={handleFileSelected} 
                    className="hidden" 
                  />
                  <button
                    onClick={() => fileInputRef.current?.click()}
                    disabled={isPdfLoading}
                    className="w-full bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 text-white font-extrabold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-colors"
                  >
                    {isPdfLoading ? (
                      <>
                        <i className="fa-solid fa-spinner fa-spin"></i>
                        PDF 메타데이터 가져오는 중...
                      </>
                    ) : (
                      <>
                        <i className="fa-solid fa-upload"></i>
                        PDF 파일 가져오기
                      </>
                    )}
                  </button>

                  {pdfText && (
                    <div className="bg-slate-950/60 p-2.5 border border-slate-800 rounded-xl text-[10px] flex justify-between items-center text-slate-400 mt-2">
                      <span className="truncate max-w-[200px]"><i className="fa-solid fa-circle-check text-emerald-400 mr-1"></i>텍스트 데이터 연동 활성화됨</span>
                      <button 
                        onClick={() => { setPdfText(""); if (fileInputRef.current) fileInputRef.current.value = ""; onClose(); }}
                        className="text-rose-400 hover:text-rose-300 font-bold"
                      >
                        해제
                      </button>
                    </div>
                  )}
                </div>
              </>
            ) : (
              <div className="space-y-4 text-xs mt-3">
                {/* File summary */}
                <div className="bg-slate-950/50 p-2.5 border border-slate-800/80 rounded-xl space-y-1">
                  <div className="text-[10px] text-slate-400 font-bold flex justify-between">
                    <span>파일명:</span>
                    <span className="text-slate-200 truncate max-w-[180px]">{fileName}</span>
                  </div>
                  <div className="text-[10px] text-slate-400 font-bold flex justify-between">
                    <span>총 페이지 수:</span>
                    <span className="text-slate-200">{totalPages}페이지</span>
                  </div>
                </div>

                {/* Scope selection */}
                <div className="space-y-1.5">
                  <label className="block text-[10px] text-slate-400 font-bold">1. 문서 지식 범위</label>
                  <div className="grid grid-cols-2 gap-2">
                    <button
                      type="button"
                      onClick={() => { setDocScope('all'); setUseSmartFilter(false); }}
                      className={`py-1.5 px-2 rounded-lg border font-bold text-[10.5px] transition-all text-center ${
                        docScope === 'all'
                          ? 'bg-cyan-600/10 border-cyan-500 text-cyan-400'
                          : 'bg-slate-950/40 border-slate-850 text-slate-400'

      useEffect(() => {
        const fetchAllScores = async () => {
          setIsLoading(true);
          let localList = [];
          const raw = localStorage.getItem('semiconductor_quiz_scores') || '[]';
          try {
            localList = JSON.parse(raw);
          } catch(e) {}

          try {
            // Fetch ALL scores (up to 500 rows) order by score descending
            const { data, error } = await supabase
              .from('leaderboard')
              .select('*')
              .order('score', { ascending: false })
              .limit(500);
              
            if (error) throw error;

            if (data && data.length > 0) {
              const mapped = data.map(item => ({
                nickname: item.nickname,
                score: item.score,
                level: item.level,
                quizType: item.quiz_type || 'all',
                sector: item.sector || 'all',
                timestamp: new Date(item.created_at).getTime()
              }));
              setAllScores(mapped);
              setIsLoading(false);
              return;
            }
          } catch(e) {
            console.warn("Supabase leaderboard fetch failed, falling back to local storage:", e.message);
          }

          // Fallback to local storage
          localList.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return b.timestamp - a.timestamp;
          });
          setAllScores(localList);
          setIsLoading(false);

        if (isOpen) {

        if (confirm("모든 로컬 랭킹 기록을 삭제하시겠습니까? (Supabase 서버 데이터는 삭제되지 않습니다)")) {

              {scores.length > 0 && (
                <button

            </div>

            {/* Quiz Type Tabs */}
            <div className="flex bg-slate-950 p-1 rounded-xl mb-3 shrink-0 gap-1 text-[10px] font-bold border border-slate-900">

                <button

            <div className="flex-1 overflow-y-auto custom-scrollbar pr-0.5 min-h-0">

                      <th className="px-3 py-2">획득 점수</th>
                      <th className="px-3 py-2 text-right">일자</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-900">
                    {scores.map((s, idx) => (
                      <tr key={idx} className="hover:bg-slate-900/30">
                        <td className="px-3 py-3 font-extrabold">
                          {idx === 0 ? (
                            <span className="text-yellow-400"><i className="fa-solid fa-crown mr-1"></i>1등</span>
                          ) : idx === 1 ? (

                        <td className="px-3 py-3 text-slate-400 text-[10px] leading-tight">
                          <div className="font-semibold">{getSectorLabel(s.sector)}</div>
                          <div className="text-[8.5px] text-slate-500 mt-0.5">{s.level === 'hard' ? '어려움 (x3)' : s.level === 'medium' ? '보통 (x2)' : '쉬움 (x1)'}</div>
                        </td>
                        <td className="px-3 py-3 font-black text-yellow-400">{s.score}점</td>
                        <td className="px-3 py-3 text-right text-slate-600 text-[9.5px]">

                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        </div>
      );
    };

    // --- 4.5 API KEY SETTINGS MODAL COMPONENT (DYNAMIC WRAPPER) ---
    const ApiKeyModal = (props) => {
      if (!window.ApiKeyModal) return null;
      return <window.ApiKeyModal {...props} />;
    };

    // --- 5. ROADMAP TAB ---
    const RoadmapTab = ({ onHoverWord, onLeaveWord }) => {

      return (
        <div className="flex flex-col h-full fade-in">
