          title: "EUV (극자외선) 양산 도입",
          desc: "기존 ArF 액침 노광의 물리적 패터닝 한계를 뛰어넘어 13.5nm 파장의 극자외선(EUV) 노광 공정이 7나노급 초미세 반도체 생산 라인에 공식 적용되어 ASML 스캐너 양산 시대를 열었습니다.",
          icon: "fa-wand-magic-sparkles",
          color: "border-pink-500 text-pink-400 shadow-pink-500/20"
        },
        {
          year: "2022",
          title: "3nm GAA (Gate-All-Around)",
          desc: "채널의 4면을 게이트가 감싸 전류 누설을 원천 차단하는 나노시트(MBCFET) 기반 GAA(Gate-All-Around) 3나노 공정이 세계 최초로 양산에 성공하여 반도체 구조적 혁신을 이룩했습니다.",
          icon: "fa-atom",
          color: "border-amber-500 text-amber-400 shadow-amber-500/20"
        }
      ];

      return (
        <div className="flex flex-col h-full fade-in">
          {/* Header */}
          <div className="shrink-0 mb-4 px-1">
            <h2 className="text-lg font-extrabold tracking-tight text-slate-100 flex items-center gap-2">
              <span className="w-2.5 h-4 bg-amber-500 rounded-full"></span>
              반도체 혁신 역사 연표
            </h2>
            <p className="text-[11px] text-slate-400">트랜지스터의 탄생부터 최첨단 GAA 공정까지의 마일스톤</p>
          </div>

          {/* Timeline Scroll Box */}
          <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4 relative">
            {/* The vertical neon line */}
            <div className="absolute left-6 top-3 bottom-6 w-0.5 bg-gradient-to-b from-cyan-500 via-violet-500 to-amber-500 shadow-[0_0_10px_rgba(139,92,246,0.3)]"></div>

            <div className="space-y-6 relative">
              {historyData.map((item, index) => (
                <div key={index} className="flex gap-4 items-start group">
                  {/* Timeline dot / icon */}
                  <div className={`w-12 h-12 rounded-full border bg-slate-950 flex items-center justify-center shrink-0 z-10 transition-all duration-300 group-hover:scale-110 shadow-[0_0_15px_transparent] group-hover:shadow-current ${item.color}`}>
                    <i className={`fa-solid ${item.icon} text-base`}></i>
                  </div>

                  {/* Milestone Card */}
                  <div className="flex-1 bg-slate-900/40 hover:bg-slate-900/70 border border-slate-800/80 hover:border-slate-700/60 p-4 rounded-2xl transition-all duration-300">
                    <div className="flex items-center justify-between gap-2 mb-1">
                      <span className="text-[10px] font-black uppercase tracking-widest text-amber-400">{item.year}년</span>
                      <span className="w-2 h-2 rounded-full bg-slate-800 group-hover:bg-amber-400 transition-colors"></span>
                    </div>
                    <h3 className="text-xs font-bold text-slate-200 mb-2">{item.title}</h3>
                    <p className="text-[10.5px] leading-relaxed text-slate-400 select-text">
                      <InteractiveText text={item.desc} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // --- 11. AI GENERATED NEWS TAB WITH CACHING ---
    const NewsTab = ({ onHoverWord, onLeaveWord }) => {
      const [news, setNews] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [remainingMinutes, setRemainingMinutes] = useState(0);
      const [activeCategory, setActiveCategory] = useState('기술'); // '기술', '소부장', '시장', '주식'

      const fetchNewsFromApi = async () => {
        setIsLoading(true);
        const prompt = `반도체 산업(소부장, 제조 공정 기술, 글로벌 시장 동향, 차세대 트랜지스터, 반도체 관련 증시 동향 및 주요 상장 주식 등)과 관련된 가상 뉴스 기사를 카테고리별로 각각 정확히 5건씩(총 20건) 생성해 주세요.
카테고리는 반드시 다음 4가지로 정확히 분류되어야 합니다:
1. '기술' (차세대 반도체 공정, 소자 연구, 미세화 공정 기법 등)
2. '소부장' (반도체 소재, 부품, 장비 국산화 및 글로벌 소부장사 동향 등)
3. '시장' (글로벌 파운드리 및 메모리 시장 점유율, 지정학적 투자 동향 등)
4. '주식' (글로벌 주요 반도체 기업 주가 변동성 분석, 실적 가상 브리핑 및 주식 정보 등)

각 뉴스 기사는 다음 필드를 가진 JSON 객체여야 합니다:
- "title": 뉴스 제목 (전문적인 반도체 헤드라인 형태)
- "content": 뉴스 상세 내용 요약 (3~4줄 내외, 한국어의 신뢰도 높은 기사체로 서술)
- "category": 기사의 카테고리 (반드시 '기술', '소부장', '시장', '주식' 중 하나로 정확하게 지정)

출력 형식은 오직 이 20개 뉴스 객체가 포함된 단일 JSON 배열 형태만 제공해 주세요. Markdown 코드 블록(예: \`\`\`json)은 포함해도 괜찮습니다.

JSON 배열 구조 예시:
[
  {
    "title": "3nm GAA 공정 수율 극대화 위한 차세대 계측 기술 양산 도입",
    "content": "글로벌 파운드리 선두 기업들이 3나노 이하 GAA 공정의 채널 제어 능력을 강화하기 위해 나노미터급 두께 계측 장비를 생산 라인에 도입했습니다. 이번 조치로 트러블슈팅 기간이 대폭 감소할 것으로 기대됩니다.",
    "category": "기술"
  }
]`;

        try {
          const rawResponse = await getGeminiResponse(prompt);
          let raw = rawResponse.trim();
          const jsonMatch = raw.match(/\[[\s\S]*\]/);
          if (jsonMatch) {
            raw = jsonMatch[0];
          }
          const parsed = JSON.parse(raw);
          
          setNews(parsed);
          const now = Date.now();
          setLastUpdated(now);
          localStorage.setItem('semiconductor_news_cache', JSON.stringify(parsed));
          localStorage.setItem('semiconductor_news_cache_time', String(now));
          setRemainingMinutes(60);
        } catch (e) {
          console.error("AI News generation failed:", e);
          alert("AI 뉴스를 받아오는 도중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
        } finally {
          setIsLoading(false);
        }
      };

      const loadCachedNews = () => {
        const cached = localStorage.getItem('semiconductor_news_cache');
        const cachedTime = localStorage.getItem('semiconductor_news_cache_time');
        
        if (cached && cachedTime) {
          const elapsed = Date.now() - Number(cachedTime);
          const oneHour = 60 * 60 * 1000;
          
          if (elapsed < oneHour) {
            try {
              setNews(JSON.parse(cached));
              setLastUpdated(Number(cachedTime));
              setRemainingMinutes(Math.ceil((oneHour - elapsed) / (60 * 1000)));
              return true;
            } catch(e) {}
          }
        }
        return false;
      };

      useEffect(() => {
        const hasCache = loadCachedNews();
        if (!hasCache) {
          fetchNewsFromApi();
        }
      }, []);

      useEffect(() => {
        const checkCooldown = () => {
          const cachedTime = localStorage.getItem('semiconductor_news_cache_time');
          if (cachedTime) {
            const elapsed = Date.now() - Number(cachedTime);
            const remaining = (60 * 60 * 1000) - elapsed;
            if (remaining > 0) {
              setRemainingMinutes(Math.ceil(remaining / (60 * 1000)));
            } else {
              setRemainingMinutes(0);
            }
          } else {
            setRemainingMinutes(0);
          }
        };
        
        checkCooldown();
        const interval = setInterval(checkCooldown, 10000); // Check every 10 seconds
        return () => clearInterval(interval);
      }, [lastUpdated]);

      const handleRefresh = () => {
        if (remainingMinutes > 0) {
          alert(`아직 업데이트 락이 걸려있습니다. ${remainingMinutes}분 후에 최신화가 가능합니다.`);
          return;
        }
        fetchNewsFromApi();
      };

      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      };

      const getCategoryStyle = (cat) => {
        switch (cat) {
          case '기술':
            return 'bg-cyan-950 text-cyan-400 border-cyan-850';
          case '시장':
            return 'bg-amber-950 text-amber-400 border-amber-850';
          case '소부장':
            return 'bg-purple-950 text-purple-400 border-purple-850';
          case '주식':
            return 'bg-emerald-950 text-emerald-400 border-emerald-850';
          default:
            return 'bg-slate-900 text-slate-400 border-slate-800';
        }
      };

      const filteredNews = news.filter(item => item.category === activeCategory);

      return (
        <div className="flex flex-col h-full fade-in">
          {/* Header */}
          <div className="shrink-0 mb-4 px-1 flex justify-between items-end">
            <div>
              <h2 className="text-lg font-extrabold tracking-tight text-slate-100 flex items-center gap-2">
                <span className="w-2.5 h-4 bg-rose-500 rounded-full"></span>
                AI 반도체 데일리 브리핑
              </h2>
              <p className="text-[11px] text-slate-400 font-medium">Gemini AI가 실시간 분석한 분야별 기사 (카테고리당 5건)</p>
            </div>
            
            <button
              onClick={handleRefresh}
              disabled={isLoading || remainingMinutes > 0}
              className={`px-3 py-1.5 rounded-xl text-[10px] font-bold border flex items-center gap-1.5 transition-all select-none ${
                remainingMinutes > 0
                  ? 'bg-slate-950 border-slate-900 text-slate-500 cursor-not-allowed'
                  : 'bg-rose-600 hover:bg-rose-500 text-white border-transparent hover:scale-102 active:scale-98'
              }`}
            >
              {isLoading ? (
                <>
                  <i className="fa-solid fa-spinner fa-spin"></i>
                  생성 중...
                </>
              ) : remainingMinutes > 0 ? (
                <>
                  <i className="fa-solid fa-lock text-[9px]"></i>
                  {remainingMinutes}분 후 갱신 가능
                </>
              ) : (
                <>
                  <i className="fa-solid fa-rotate"></i>
                  데일리 뉴스 최신화
                </>
              )}
            </button>
          </div>

          {/* News update timestamp indicator & Category selection sub-tabs */}
          <div className="shrink-0 mb-3 px-1 flex flex-col gap-3">
            {lastUpdated && (
              <div className="text-[10px] text-slate-500 font-bold flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                {formatTime(lastUpdated)} 업데이트 완료 (로컬 캐시 활성화 중)
              </div>
            )}
            
            {/* Sector Tabs Bar */}
            <div className="flex bg-slate-950 p-1 rounded-xl gap-1 text-[10.5px] font-bold border border-slate-900 shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)]">
              {[
                { id: '기술', label: '차세대 기술 (5)' },
                { id: '소부장', label: '핵심 소부장 (5)' },
                { id: '시장', label: '글로벌 시장 (5)' },
                { id: '주식', label: '증시 및 주식 (5)' }
              ].map(cat => (
                <button
                  key={cat.id}
                  onClick={() => setActiveCategory(cat.id)}
                  className={`flex-1 py-2 rounded-lg text-center transition-all ${
                    activeCategory === cat.id 
                      ? 'bg-rose-600/20 text-rose-400 border border-rose-500/30 shadow-[0_0_8px_rgba(244,63,94,0.1)]' 
                      : 'text-slate-400 hover:text-slate-200 border border-transparent'
                  }`}
                >
                  {cat.label}
                </button>
              ))}
            </div>
          </div>

          {/* News Cards List */}
          <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 pb-4">
            {isLoading ? (
              <div className="h-64 flex flex-col items-center justify-center space-y-4">
                <i className="fa-solid fa-wand-magic-sparkles text-3xl text-rose-500 animate-pulse"></i>
                <span className="text-xs text-slate-400 font-bold">Gemini AI가 실시간 반도체 뉴스를 취재하고 있습니다...</span>
                <div className="w-24 h-1 bg-slate-950 rounded-full overflow-hidden">
                  <div className="h-full bg-rose-500 animate-[pulse_1.5s_infinite] w-full"></div>
                </div>
              </div>
            ) : filteredNews.length === 0 ? (
              <div className="h-64 flex flex-col items-center justify-center text-slate-500 text-xs gap-2">
                <i className="fa-solid fa-newspaper text-2xl text-slate-700"></i>
                <span>생성된 기사가 없습니다. 뉴스 최신화를 진행해 주세요.</span>
              </div>
            ) : (
              <div className="grid grid-cols-1 gap-4">
                {filteredNews.map((item, index) => (
                  <div key={index} className="bg-slate-900/40 hover:bg-slate-900/60 border border-slate-800/80 hover:border-slate-700/60 p-4 rounded-2xl transition-all duration-300 flex flex-col justify-between">
                    <div>
                      <div className="flex items-center justify-between mb-2">
                        <span className={`px-2 py-0.5 rounded text-[8.5px] font-extrabold border uppercase tracking-wider ${getCategoryStyle(item.category)}`}>
                          {item.category}
                        </span>
                        <span className="text-[9.5px] text-slate-500 font-bold">기사 {index + 1} / 5</span>
                      </div>
                      <h3 className="text-xs font-bold text-slate-200 mb-2 leading-snug">{item.title}</h3>
                      <p className="text-[10.5px] leading-relaxed text-slate-400 select-text">
                        <InteractiveText text={item.content} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- 8. FLOATING AI CHAT COMPONENT (FAB Modal) ---
    const FloatingAiChat = ({ pdfText, onHoverWord, onLeaveWord }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [messages, setMessages] = useState([
        { id: 1, role: 'assistant', text: '안녕하세요! 반도체 백서 및 교재 질문이 가능합니다. 궁금한 공정 오류나 원리를 편하게 여쭤보세요.' }
      ]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => {
        if (isOpen) {
          chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, isOpen]);

      const handleSend = async () => {
        if (!input.trim() || isLoading) return;
        const text = input;
        setInput('');

        // Add user message and a placeholder message for assistant streaming
        const userMsg = { id: Date.now(), role: 'user', text };
        const assistantMsgId = Date.now() + 1;
        const assistantPlaceholder = { id: assistantMsgId, role: 'assistant', text: '' };

        setMessages(prev => [...prev, userMsg, assistantPlaceholder]);
        setIsLoading(true);

        // Build system instruction
        let systemPrompt = `You are a world-class semiconductor process engineer and cleanroom troubleshooter. Explain clearly in Korean with markdown formatting.
        CRITICAL: 특별히 사용자가 자세히 설명해달라고 하거나 길게 답변해달라고 요청하지 않는 한, 반드시 5줄 이내로 핵심만 짧고 명확하게 답해야 합니다. (Limit response to 5 lines or less in Korean unless explicitly asked otherwise.)`;

        if (pdfText) {
          systemPrompt += `\n\n[User uploaded learning document text context]:\n${pdfText}\n(Refer to this document text to answer the query if relevant.)`;
        }

        // Filter and map conversation history turns to match Gemini API specification.
        // It must start with user turn and alternate user/model.
        const historyTurns = messages
          .filter(m => m.id !== 1 && m.id !== assistantMsgId && !m.text.startsWith("죄송합니다. AI 응답을 받지 못했습니다."))
          .map(m => ({
            role: m.role === 'assistant' ? 'model' : 'user',
            parts: [{ text: m.text }]
          }));

        // Append the current turn
        historyTurns.push({
          role: 'user',
          parts: [{ text: text }]
        });

        const payload = {
          contents: historyTurns,
          systemInstruction: {
            parts: [{ text: systemPrompt }]
          }
        };

        let fullResponse = "";

        try {
          await getGeminiResponseStream(
            payload,
            (chunk) => {
              fullResponse += chunk;
              setMessages(prev => prev.map(m => m.id === assistantMsgId ? { ...m, text: fullResponse } : m));
            },
            (err) => {
              setMessages(prev => prev.map(m => m.id === assistantMsgId ? { ...m, text: `죄송합니다. AI 응답을 받지 못했습니다.\n[원인 상세]: ${err.message}` } : m));
            }
          );
        } catch(e) {
          setMessages(prev => prev.map(m => m.id === assistantMsgId ? { ...m, text: `죄송합니다. AI 응답을 받지 못했습니다.\n[원인 상세]: ${e.message}` } : m));
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <>
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="fixed bottom-20 right-4 w-12 h-12 rounded-full bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center shadow-2xl z-50 transition-transform hover:scale-105 active:scale-95 pulse-glow"
            title="AI 트러블슈팅 상담소 열기"
          >
            <i className={`fa-solid ${isOpen ? 'fa-xmark' : 'fa-brain'} text-base`}></i>
          </button>

          {isOpen && (
            <div className="fixed bottom-36 right-4 w-80 h-96 bg-slate-950/90 border border-cyan-500/40 rounded-2xl shadow-2xl flex flex-col z-50 fade-in overflow-hidden backdrop-blur-md">
              <div className="shrink-0 bg-slate-900 border-b border-slate-800 p-3 flex justify-between items-center">
                <span className="text-[11.5px] font-black text-cyan-400 flex items-center gap-1.5">
                  <i className="fa-solid fa-robot"></i>
                  AI 실시간 공정 상담실
                </span>
                {pdfText && (
                  <span className="bg-cyan-950 text-cyan-400 text-[8.5px] font-bold px-1.5 py-0.5 rounded border border-cyan-800">
                    PDF 연동
                  </span>
                )}
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-3.5 min-h-0 bg-slate-900/10">
                {messages.map(m => (
                  <div key={m.id} className={`flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}`}>
                    <div 
                      className={`max-w-[90%] rounded-xl p-2.5 text-[10.5px] leading-relaxed ${
                        m.role === 'user' 
                          ? 'bg-cyan-600 text-white rounded-tr-none' 
                          : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'
                      }`}
                    >
                      {m.role === 'assistant' ? (
                        m.text ? (
                          <InteractiveText text={m.text} onHoverWord={onHoverWord} onLeaveWord={onLeaveWord} />
                        ) : (
                          <div className="flex items-center gap-1 py-1 px-1">
                            <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                            <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                            <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                          </div>
                        )
                      ) : (
                        m.text
                      )}
                    </div>
                  </div>
                ))}
                {isLoading && (
                  <div className="text-[9.5px] text-cyan-400 font-bold flex items-center gap-1">
                    <i className="fa-solid fa-spinner fa-spin"></i>
                    답변중...
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              <div className="shrink-0 border-t border-slate-800 p-2 flex gap-1.5 items-center bg-slate-950">
                <input
                  type="text"
                  placeholder="공정 결함에 대해 물어보세요..."
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      handleSend();
                    } else if (e.key === 'ArrowUp') {
                      e.preventDefault();
                      const userMsgs = messages.filter(m => m.role === 'user');
                      if (userMsgs.length > 0) {
                        setInput(userMsgs[userMsgs.length - 1].text);
                      }
                    }
                  }}
                  disabled={isLoading}
                  className="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-1.5 text-[10.5px] outline-none text-slate-100 placeholder-slate-500"
                />
                <button
                  onClick={handleSend}
                  disabled={isLoading || !input.trim()}
                  className="w-7 h-7 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition-colors disabled:bg-slate-800 disabled:text-slate-600"
                >
                  <i className="fa-solid fa-arrow-up text-xs"></i>
                </button>
              </div>
            </div>
          )}
        </>
      );
    };


    // --- 8.5 3D FET EXPLORER TAB COMPONENT ---
    const FetExplorerTab = () => {
      const [baseline, setBaseline] = React.useState('gaafet');
      const [numVariants, setNumVariants] = React.useState(50);
      const [structures, setStructures] = React.useState([]);
      const [selectedId, setSelectedId] = React.useState(null);
      const [isGenerating, setIsGenerating] = React.useState(false);
      
      const [isThreeLoaded, setIsThreeLoaded] = React.useState(!!(window.THREE && window.THREE.OrbitControls));
      
      const canvasRef = React.useRef(null);
      const viewerState = React.useRef({ scene: null, camera: null, renderer: null, controls: null, currentGroup: null });

      React.useEffect(() => {
        if (isThreeLoaded) return;
        const checkThree = () => {
          if (window.THREE && window.THREE.OrbitControls) {
            setIsThreeLoaded(true);
          } else {
            setTimeout(checkThree, 50);
          }
        };
        checkThree();
      }, [isThreeLoaded]);

      const formatPercent = (val) => {
        const pct = ((val - 1.0) * 100).toFixed(1);
        if (pct > 0) return '+' + pct + '%';
        return pct + '%';
      };

      const getValClass = (val, isGoodHigh) => {
        if (val > 1.05) return isGoodHigh ? 'text-emerald-400 font-bold' : 'text-rose-400 font-bold';
        if (val < 0.95) return isGoodHigh ? 'text-rose-400 font-bold' : 'text-emerald-400 font-bold';
        return 'text-slate-400';
      };

      const runGeneration = () => {
        setIsGenerating(true);
        setTimeout(() => {
          try {
            const data = localGenerateStructures(baseline, numVariants);
            setStructures(data);
            if (data.length > 0) {
              setSelectedId(data[0].id);
            }
          } catch (err) {
            console.error(err);
            alert("구조 생성 실패");
          } finally {
            setIsGenerating(false);
          }
        }, 150);
      };

      React.useEffect(() => {
        if (!isThreeLoaded || !canvasRef.current) return;
        const container = canvasRef.current;
        const THREE = window.THREE;
        const OrbitControls = THREE.OrbitControls;

        const scene = new THREE.Scene();
        const aspect = (container.clientWidth / container.clientHeight) || 1.0;
        const camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
        camera.position.set(20, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        container.innerHTML = '';
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xaabbff, 0.5);
        dirLight2.position.set(-10, 10, -10);
        scene.add(dirLight2);

        viewerState.current = { scene, camera, renderer, controls, currentGroup: null };

        const handleResize = () => {
          if (!container || !camera || !renderer) return;
          camera.aspect = (container.clientWidth / container.clientHeight) || 1.0;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        };
        window.addEventListener('resize', handleResize);

        let animId;
        const animate = () => {
          animId = requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        };
        animate();

        return () => {
          cancelAnimationFrame(animId);
          window.removeEventListener('resize', handleResize);
          if (renderer) {
            renderer.dispose();
          }
        };
      }, [isThreeLoaded]);

      const selectedItem = structures.find(s => s.id === selectedId);
      React.useEffect(() => {
        if (!isThreeLoaded || !selectedItem || !viewerState.current.scene) return;
        const { scene, camera, controls } = viewerState.current;
        const THREE = window.THREE;

        if (viewerState.current.currentGroup) {
          scene.remove(viewerState.current.currentGroup);
        }

        const currentGroup = new THREE.Group();

        const substrateMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.8 });
        const oxideMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.6, roughness: 0.2 });
        const channelMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.3, roughness: 0.4 });
        const gateMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, metalness: 0.8, roughness: 0.2 });
        const sdMat = new THREE.MeshStandardMaterial({ color: 0x10b981, metalness: 0.5, roughness: 0.5 });
        const thermalMat = new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.2, roughness: 0.8 });

        const substrateGeo = new THREE.BoxGeometry(20, 2, 10);
        const substrate = new THREE.Mesh(substrateGeo, substrateMat);
        substrate.position.y = -1;
        currentGroup.add(substrate);

        const lg = Math.max(4, Math.min(10, selectedItem.gateLength / 2));
        const w = 4;

        if (selectedItem.type === 'mosfet') {
          const sdGeo = new THREE.BoxGeometry(4, 1, 10);
          const source = new THREE.Mesh(sdGeo, sdMat);
          source.position.set(-6, 0.5, 0);
          const drain = new THREE.Mesh(sdGeo, sdMat);
          drain.position.set(6, 0.5, 0);
          currentGroup.add(source, drain);

          const channelGeo = new THREE.BoxGeometry(8, 0.2, 10);
          const channel = new THREE.Mesh(channelGeo, channelMat);
          channel.position.set(0, 0.1, 0);
          currentGroup.add(channel);

          const oxGeo = new THREE.BoxGeometry(lg, 0.5, 10);
          const ox = new THREE.Mesh(oxGeo, oxideMat);
          ox.position.set(0, 0.45, 0);
          currentGroup.add(ox);

          const gateGeo = new THREE.BoxGeometry(lg, 2, 10);
          const gate = new THREE.Mesh(gateGeo, gateMat);
          gate.position.set(0, 1.7, 0);
          currentGroup.add(gate);

        } else if (selectedItem.type === 'finfet') {
          const fins = selectedItem.sheets;
          const finSpacing = 2.5;
          const totalWidth = (fins - 1) * finSpacing;
          const startZ = -totalWidth / 2;

          for(let i=0; i<fins; i++) {
            const z = startZ + i * finSpacing;
            const finGeo = new THREE.BoxGeometry(16, 4, 1);
            const fin = new THREE.Mesh(finGeo, channelMat);
            fin.position.set(0, 2, z);
            currentGroup.add(fin);

            const sdExtGeo = new THREE.BoxGeometry(4, 4.2, 1.2);
            const source = new THREE.Mesh(sdExtGeo, sdMat);
            source.position.set(-6, 2.1, z);
            const drain = new THREE.Mesh(sdExtGeo, sdMat);
            drain.position.set(6, 2.1, z);
            currentGroup.add(source, drain);
          }

          const gateWidth = lg;
          const gateHeight = 5;
          const gateDepth = totalWidth + 3;

          const gateGeo = new THREE.BoxGeometry(gateWidth, gateHeight, gateDepth);
          const gate = new THREE.Mesh(gateGeo, gateMat);
          gate.position.set(0, 2.5, 0);

          const oxGeo = new THREE.BoxGeometry(gateWidth + 0.4, gateHeight + 0.4, gateDepth + 0.4);
          const ox = new THREE.Mesh(oxGeo, oxideMat);
          ox.position.set(0, 2.5, 0);

          currentGroup.add(ox, gate);

        } else if (selectedItem.type === 'gaafet') {
          const sheets = selectedItem.sheets;
          const sheetSpacing = selectedItem.sheetSpacing / 2;
          const sheetThickness = selectedItem.sheetThickness / 4;

          const sdGeo = new THREE.BoxGeometry(4, 6, 8);
          const source = new THREE.Mesh(sdGeo, sdMat);
          source.position.set(-6, 3, 0);
          const drain = new THREE.Mesh(sdGeo, sdMat);
          drain.position.set(6, 3, 0);
          currentGroup.add(source, drain);

          for(let i=0; i<sheets; i++) {
            const y = 1 + i * (sheetThickness + sheetSpacing);
            const sheetGeo = new THREE.BoxGeometry(8, sheetThickness, w);
            const sheet = new THREE.Mesh(sheetGeo, channelMat);
            sheet.position.set(0, y, 0);
            currentGroup.add(sheet);
          }

          const gateGeo = new THREE.BoxGeometry(lg, 6, w + 2);
          const gate = new THREE.Mesh(gateGeo, gateMat);
          gate.position.set(0, 3, 0);
          currentGroup.add(gate);
        }

        if (selectedItem.hasThermalLayer) {
          const thermalGeo = new THREE.BoxGeometry(20, 0.5, 10);
          const thermal = new THREE.Mesh(thermalGeo, thermalMat);
          thermal.position.set(0, -2.25, 0);
          currentGroup.add(thermal);
        }

        scene.add(currentGroup);
        viewerState.current.currentGroup = currentGroup;

        camera.position.set(15, 15, 20);
        controls.target.set(0, 2, 0);
        controls.update();
      }, [isThreeLoaded, selectedId, structures]);

      const localGenerateStructures = (baselineKey, count) => {
        const BASELINES = {
          finfet: { name: 'FinFET', Ion: 1.0, Ioff: 1.0, deltaT: 1.0, Rsd: 1.0, sheets: 1, type: 'finfet' },
          mosfet: { name: 'MOSFET', Ion: 0.8, Ioff: 1.2, deltaT: 0.8, Rsd: 1.1, sheets: 1, type: 'mosfet' },
          gaafet: { name: 'GAAFET', Ion: 1.2, Ioff: 0.6, deltaT: 1.2, Rsd: 0.9, sheets: 3, type: 'gaafet' }
        };
        const baseline = BASELINES[baselineKey];
        const results = [];
        let attempts = 0;
        const MAX_ATTEMPTS = count * 100;

        const randRange = (min, max) => Math.random() * (max - min) + min;
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const CONSTRAINTS = {
          maxSheetThickness: 8,
          minGateLength: 10,
          minSheetSpacing: 4,
          maxDeltaT: 1.5
        };

        while (results.length < count && attempts < MAX_ATTEMPTS) {
          attempts++;
          const type = ['finfet', 'mosfet', 'gaafet'][randInt(0, 2)];
          const sheets = type === 'mosfet' ? 1 : randInt(1, 5);
          const sheetThickness = randRange(3, 10);
          const sheetSpacing = type === 'gaafet' ? randRange(2, 8) : 0;
          const gateLength = randRange(8, 20);
          const tox = randRange(0.5, 2.5);
          const hasThermalLayer = Math.random() > 0.5;

          if (sheetThickness > CONSTRAINTS.maxSheetThickness) continue;
          if (gateLength < CONSTRAINTS.minGateLength) continue;
          if (type === 'gaafet' && sheetSpacing < CONSTRAINTS.minSheetSpacing) continue;

          let rawIon = 0, rawIoff = 0, rawDeltaT = 0, rawRsd = 0;
          if (type === 'gaafet') {
            rawIon = 1.1 * sheets * (1 / tox) * (gateLength / 12);
            rawIoff = 0.5 * Math.exp(tox - 1.5) / sheets;
            rawRsd = 0.8 + (0.1 * sheets);
            rawDeltaT = 1.1 + (0.15 * sheets);
          } else if (type === 'finfet') {
            rawIon = 1.0 * sheets * (1 / tox) * (gateLength / 14);
            rawIoff = 0.8 * Math.exp(tox - 1.5) / sheets;
            rawRsd = 1.0 + (0.05 * sheets);
            rawDeltaT = 1.0 + (0.1 * sheets);
          } else {
            rawIon = 0.7 * (1 / tox) * (gateLength / 16);
            rawIoff = 1.5 * Math.exp(tox - 1.0);
            rawRsd = 1.2;
            rawDeltaT = 0.8;
          }

          if (hasThermalLayer) {
            rawDeltaT *= 0.7;
            rawRsd *= 1.1;
          }
          rawIon *= (10 / gateLength);
          rawIoff *= (15 / gateLength);

          const processVariationPenalty = type === 'gaafet' && sheets > 3 ? 0.95 : 1.0;
          rawIon *= processVariationPenalty;

          rawIon = Math.max(0.1, rawIon);
          rawIoff = Math.max(0.01, rawIoff);

          if (rawDeltaT > CONSTRAINTS.maxDeltaT) continue;

          const normIon = rawIon / baseline.Ion;
          const normIoff = rawIoff / baseline.Ioff;
          const normDeltaT = rawDeltaT / baseline.deltaT;
          const normRsd = rawRsd / baseline.Rsd;
          const ionIoffRatio = normIon / normIoff;

          const processSteps = type === 'gaafet' ? 5 + sheets : (type === 'finfet' ? 4 : 2);
          const complexityPenalty = processSteps * 0.1;
          const score = (ionIoffRatio * 2.0) - (normDeltaT * 1.5) - (normRsd * 1.0) - complexityPenalty;

          let summary = `${type.toUpperCase()} with `;
          if (type !== 'mosfet') summary += `${sheets} sheets (${sheetThickness.toFixed(1)}nm), `;
          summary += `Lg=${gateLength.toFixed(1)}nm`;
          if (hasThermalLayer) summary += ` + Thermal Layer`;

          let cause = [];
          if (hasThermalLayer) cause.push("Thermal layer reduced ΔT.");
          if (type === 'gaafet' && sheets > baseline.sheets) cause.push("Increased sheet count boosted Ion.");
          if (tox < 1.0) cause.push("Thin oxide improved control but may impact Ioff.");
          if (gateLength < 12) cause.push("Short gate increased Ion but degraded Ioff.");

          results.push({
            id: Math.random().toString(36).substr(2, 9),
            type,
            sheets,
            sheetThickness,
            sheetSpacing,
            gateLength,
            tox,
            hasThermalLayer,
            metrics: {
              Ion: normIon,
              Ioff: normIoff,
              IonIoff: ionIoffRatio,
              deltaT: normDeltaT,
              Rsd: normRsd
            },
            score,
            summary,
            cause: cause.join(" ") || "Standard variation."
          });
        }
        results.sort((a, b) => b.score - a.score);
        return results;
      };

      return (
        <div className="w-full flex flex-col space-y-4 md:h-full md:flex-row md:space-y-0 md:space-x-4 min-h-0 select-none">
          {/* Controls Panel */}
          <div className="md:w-60 shrink-0 bg-slate-950/60 border border-slate-900 rounded-3xl p-5 flex flex-col space-y-4 shadow-xl backdrop-blur-md">
            <div>
              <h2 className="text-sm font-extrabold text-slate-100 flex items-center gap-1.5 mb-1.5">
                <i className="fa-solid fa-gears text-indigo-400"></i>
                3D FET 설정 조율
              </h2>
              <p className="text-[10px] text-slate-400 leading-normal">반도체 트랜지스터(FinFET, MOSFET, GAAFET)의 제약 난수 생성 실험실입니다.</p>
            </div>
            
            <div className="space-y-3.5 pt-2 border-t border-slate-900">
              <div>
                <label className="block text-[10px] text-slate-400 font-extrabold uppercase tracking-wide mb-1.5">기준 아키텍처 (Baseline)</label>
                <select
                  value={baseline}
                  onChange={e => setBaseline(e.target.value)}
                  className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500"
                >
                  <option value="finfet">FinFET (1.0x)</option>
                  <option value="mosfet">Planar MOSFET (0.8x)</option>
                  <option value="gaafet">GAAFET (1.2x)</option>
                </select>
              </div>

              <div>
                <label className="block text-[10px] text-slate-400 font-extrabold uppercase tracking-wide mb-1.5">생성 변이 수 (Variants)</label>
                <input
                  type="number"
                  min="10"
                  max="1000"
                  value={numVariants}
                  onChange={e => setNumVariants(Math.max(10, Math.min(1000, parseInt(e.target.value) || 10)))}
                  className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500 font-mono"
                />
              </div>

              <button
                onClick={runGeneration}
                disabled={isGenerating}
                className="w-full py-3.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-xs transition-colors flex items-center justify-center gap-1.5 active:scale-[0.98] disabled:opacity-50"
              >
                <i className="fa-solid fa-wand-magic-sparkles text-xs"></i>
                {isGenerating ? '구조 생성 중...' : '임의 구조 생성'}
              </button>
            </div>
          </div>

          {/* Results and 3D View Panel */}
          <div className="flex-1 flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 min-h-0">
            {/* Table Panel - Shrunk visually */}
            <div className="flex-1 md:max-w-[480px] bg-slate-950/60 border border-slate-900 rounded-3xl p-5 flex flex-col min-h-[250px] md:min-h-0 shadow-xl backdrop-blur-md">
              <h2 className="text-sm font-extrabold text-slate-100 flex items-center gap-1.5 mb-3 shrink-0">
                <i className="fa-solid fa-table-list text-indigo-400"></i>
                생성된 소자 리스트
              </h2>
              
              <div className="flex-1 overflow-auto custom-scrollbar border border-slate-900 rounded-2xl bg-slate-950/20">
                <table className="w-full text-left border-collapse text-[10px]">
                  <thead className="bg-slate-950/80 sticky top-0 z-10 border-b border-slate-900">
                    <tr>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">구조 요약</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">품질 점수</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">Ion/Ioff</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">Ion</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">Ioff</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">ΔT (발열)</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">Rsd (기생저항)</th>
                      <th className="py-2 px-2.5 text-slate-400 font-extrabold">변동 원인</th>
                    </tr>
                  </thead>
                  <tbody>
                    {structures.map((item) => (
                      <tr
                        key={item.id}
                        onClick={() => setSelectedId(item.id)}
                        className={`border-b border-slate-900/60 cursor-pointer transition-colors hover:bg-slate-900/20 ${item.id === selectedId ? 'bg-indigo-500/10' : ''}`}
                      >
                        <td className="py-2 px-2.5 font-semibold text-slate-200">{item.summary}</td>
                        <td className="py-2 px-2.5 font-mono font-bold text-indigo-400">{item.score.toFixed(2)}</td>
                        <td className="py-2 px-2.5"><span className="font-mono">{item.metrics.IonIoff.toFixed(2)} ({formatPercent(item.metrics.IonIoff)})</span></td>
                        <td className="py-2 px-2.5"><span className="font-mono">{item.metrics.Ion.toFixed(2)} ({formatPercent(item.metrics.Ion)})</span></td>
                        <td className="py-2 px-2.5"><span className="font-mono">{item.metrics.Ioff.toFixed(2)} ({formatPercent(item.metrics.Ioff)})</span></td>
                        <td className="py-2 px-2.5"><span className="font-mono">{item.metrics.deltaT.toFixed(2)} ({formatPercent(item.metrics.deltaT)})</span></td>
                        <td className="py-2 px-2.5"><span className="font-mono">{item.metrics.Rsd.toFixed(2)} ({formatPercent(item.metrics.Rsd)})</span></td>
                        <td className="py-2 px-2.5 text-slate-500 max-w-[120px] truncate" title={item.cause}>{item.cause}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* 3D Viewer Panel - Expanded dynamically */}
            <div className="flex-1 md:w-[480px] shrink-0 bg-slate-950/60 border border-slate-900 rounded-3xl p-5 flex flex-col space-y-4 shadow-xl backdrop-blur-md min-h-[350px] md:min-h-0">
              <h2 className="text-sm font-extrabold text-slate-100 flex items-center gap-1.5 shrink-0">
                <i className="fa-solid fa-cube text-indigo-400"></i>
                3D 인터랙티브 뷰
              </h2>
              
              <div className="flex-1 relative border border-slate-900 rounded-2xl overflow-hidden bg-slate-950/40 flex flex-col justify-end min-h-0">
                <div ref={canvasRef} className="absolute inset-0 z-0"></div>
                
                {!selectedId && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center p-4 text-center z-10 bg-slate-950/80">
                    <i className="fa-solid fa-hand-pointer text-xl text-slate-600 mb-2"></i>
                    <p className="text-[10px] text-slate-400">테이블에서 구조를 선택하면 3D 모델이 렌더링됩니다. 드래그하여 회전, 휠로 줌인/아웃이 가능합니다.</p>
                  </div>
                )}
                
                {selectedItem && (
                  <div className="relative z-10 m-2.5 p-3 rounded-xl bg-slate-950/90 border border-slate-900 shadow-lg text-[10px] text-slate-300 space-y-1.5 backdrop-blur-sm max-h-[140px] overflow-y-auto custom-scrollbar select-text shrink-0">
                    <div className="font-extrabold text-indigo-400 border-b border-slate-900 pb-1 flex justify-between items-center">
                      <span>소자 상세 스펙</span>
                      <span className="text-[8px] px-1.5 py-0.5 rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">{selectedItem.type.toUpperCase()}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-x-2 gap-y-1">
                      <div><span className="text-slate-500">채널 핀/시트 수:</span> <span className="font-bold font-mono text-slate-300">{selectedItem.sheets}개</span></div>
                      <div><span className="text-slate-500">게이트 길이(Lg):</span> <span className="font-bold font-mono text-slate-300">{selectedItem.gateLength.toFixed(1)} nm</span></div>
                      <div><span className="text-slate-500">시트 두께:</span> <span className="font-bold font-mono text-slate-300">{selectedItem.sheetThickness.toFixed(1)} nm</span></div>
                      <div><span className="text-slate-500">유효 절연막 두께:</span> <span className="font-bold font-mono text-slate-300">{selectedItem.tox.toFixed(2)} nm</span></div>
                      <div className="col-span-2"><span className="text-slate-500">방열 레이어 연동:</span> <span className="font-bold">{selectedItem.hasThermalLayer ? '연동됨 (Yes)' : '없음 (No)'}</span></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 9. MAIN APP CONTAINER ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('roadmap');
      const [pdfText, setPdfText] = useState("");

      const [theme, setTheme] = useState(() => localStorage.getItem('app_theme') || 'light');

      useEffect(() => {
        document.documentElement.classList.remove('light-mode', 'navy-mode');
        if (theme === 'light') {
          document.documentElement.classList.add('light-mode');
        } else if (theme === 'navy') {
          document.documentElement.classList.add('navy-mode');
        }
        localStorage.setItem('app_theme', theme);
      }, [theme]);

      const [customApiKey, setCustomApiKey] = useState(() => localStorage.getItem('user_gemini_api_key') || '');
      const [isApiModalOpen, setIsApiModalOpen] = useState(false);

      useEffect(() => {
        const handleOpenModal = () => {
          setIsApiModalOpen(true);
        };
        window.addEventListener('open-api-key-modal', handleOpenModal);
        return () => {
          window.removeEventListener('open-api-key-modal', handleOpenModal);
        };
      }, []);

      const [useAiQuiz, setUseAiQuiz] = useState(false);
      const [prefetchedQuiz, setPrefetchedQuiz] = useState([]);
      const [isPrefetching, setIsPrefetching] = useState(false);

      const [isPdfModalOpen, setIsPdfModalOpen] = useState(false);
      const [isRankingModalOpen, setIsRankingModalOpen] = useState(false);

      const [tooltip, setTooltip] = useState({
        isOpen: false,
        word: '',
        text: '',
        x: 0,
        y: 0,
        isLoading: false
      });

      const [selectionMenu, setSelectionMenu] = useState({
        isOpen: false,
        text: '',
        x: 0,
        y: 0
      });

      const [glossaryCache, setGlossaryCache] = useState({});

      const handleRegisterScore = async (nickname, score, level, quizType = 'all', sector = 'all') => {
        const record = {
          nickname,
          score,
          level,
          quizType,
          sector,
          timestamp: Date.now()
        };

        // 1. Always save to LocalStorage as a local backup
        const raw = localStorage.getItem('semiconductor_quiz_scores') || '[]';
        try {
          const list = JSON.parse(raw);
          list.push(record);
          localStorage.setItem('semiconductor_quiz_scores', JSON.stringify(list));
        } catch(e) {}

        // 2. Try to insert score to Supabase 'leaderboard' table
        try {
          const { error } = await supabase
            .from('leaderboard')
            .insert([{ nickname, score, level, quiz_type: quizType, sector }]);
          if (error) throw error;
        } catch(e) {
          console.warn("Failed to write score to Supabase 'leaderboard' table. Error:", e.message);
        }
      };

      // Background AI Quiz Prefetcher: Difficuly setting (level) integrated
      const handleTriggerPrefetch = async (overrideText = null, sector = 'all', type = 'all', level = 'easy') => {
        const textContent = overrideText !== null ? overrideText : pdfText;
        setIsPrefetching(true);

        let sectorLabel = "전체 8대 공정 종합";
        if (sector !== 'all') {
          const matched = PROCESS_DATA.find(p => p.id === Number(sector));
          if (matched) sectorLabel = matched.name;
        }

        const typePrompt = type === 'all' 
          ? "mix of multiple-choice (choice type), OX (ox type), and short-answer (short type) questions"
          : type === 'choice'
            ? "multiple-choice (choice type) only"
            : type === 'ox'
              ? "OX (ox type) only"
              : "short-answer (short type) only";

        let contextSource = "반도체 공학 일반 지식";
        if (textContent) {
          contextSource = `사용자가 제공한 PDF 교재 텍스트 컨텍스트:\n${textContent}\n`;
        }

        const promptText = `반도체 공정 교육용 퀴즈를 생성해 주세요.

[출제 조건]
- 선택한 공정 종류: ${sectorLabel} (${sector === 'all' ? '전체 8대 공정 통합' : '개별 공정'})
- 문제 난이도: ${level === 'hard' ? '상 (공정 트러블슈팅, 오류 추론, 파라미터 계산 등 깊이 있는 문제)' : level === 'medium' ? '중 (작동 메커니즘, 장비 조건, 기법 비교 등 이해도 점검)' : '하 (용어 정의, 기본 개념 단순 암기)'}
- 퀴즈 문제 종류: ${typePrompt}
- 출제에 사용할 근거 데이터:
${contextSource}

[출력 형식 및 주의사항]
- 반드시 아래의 JSON 형식을 따라 5개의 문제를 한국어로 생성해 주세요.
- 응답에 Markdown 코드 블록(예: \`\`\`json)을 포함해도 괜찮지만, 파싱이 가능하도록 정확한 JSON 배열 구조만 출력해야 합니다.
- 객관식(choice)의 options는 4개의 항목을 제공하고, answer는 정답 옵션의 인덱스("0", "1", "2", "3") 문자열이어야 합니다.
- OX(ox)의 options는 ["O", "X"] 이고, answer는 "O" 또는 "X" 여야 합니다.
- 주관식(short)의 options는 빈 배열 [] 이고, answer는 정확한 정답 단어(예: "EUV", "CMP" 등)여야 합니다.
- explanation에는 오답 노트 작성을 위한 친절하고 상세한 한국어 해설을 기재해 주세요.

JSON 구조 예시:
[
  {
    "id": 1,
    "procId": ${sector === 'all' ? 1 : Number(sector)},
    "type": "choice",
    "question": "웨이퍼 제조 공정 중 실리콘 단결정 덩어리를 일컫는 용어는 무엇인가?",
    "options": ["잉곳", "웨이퍼", "슬라이스", "도너"],
    "answer": "0",
    "explanation": "고순도로 정제된 실리콘 용융액으로부터 성장시킨 단결정 실리콘 원기둥 덩어리를 잉곳(Ingot)이라고 부릅니다."
  }
]`;

        try {
          const rawText = await getGeminiResponse(promptText);
          let raw = rawText.trim();
          const jsonMatch = raw.match(/\[[\s\S]*\]/);
          if (jsonMatch) {
            raw = jsonMatch[0];
          }
          const parsed = JSON.parse(raw);
          setPrefetchedQuiz(parsed);
        } catch(err) {
          console.warn("Background prefetch failed. Fallback default local config database will be used.", err);
          setPrefetchedQuiz([]);
        } finally {
          setIsPrefetching(false);
        }
      };

      // Hover Tooltip Trigger
      const handleHoverWord = async (word, event) => {
        const rect = event.target.getBoundingClientRect();
        const x = rect.left + window.scrollX;
        const y = rect.top + window.scrollY - 8;

        setTooltip({
          isOpen: true,
          word,
          text: GLOSSARY_DB[word] || glossaryCache[word] || '',
          x,
          y,
          isLoading: !(GLOSSARY_DB[word] || glossaryCache[word])
        });

        if (!GLOSSARY_DB[word] && !glossaryCache[word]) {
          try {
            const promptText = `Explain the semiconductor related term "${word}" in 1 concise sentence in Korean.`;
            const explanation = await getGeminiResponse(promptText);
            const cleanExp = explanation.trim();
            setGlossaryCache(prev => ({ ...prev, [word]: cleanExp }));
            
            setTooltip(prev => {
              if (prev.word === word) {
                return { ...prev, text: cleanExp, isLoading: false };
              }
              return prev;
            });
          } catch (err) {
            setTooltip(prev => {
              if (prev.word === word) {
                return { ...prev, text: `해설 로드 실패.\n[원인]: ${err.message}`, isLoading: false };
              }
              return prev;
            });
          }
        }
      };

      const handleLeaveWord = () => {
        setTooltip(prev => ({ ...prev, isOpen: false }));
      };

      // Selection drag-to-explain listener
      useEffect(() => {
        const handleMouseUp = () => {
          setTimeout(() => {
            const selection = window.getSelection();
            const selectedText = selection.toString().trim();
            
            // Only trigger for reasonable length terms (between 2 and 40 characters)
            if (selectedText && selectedText.length >= 2 && selectedText.length <= 40) {
              try {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                  setSelectionMenu({
                    isOpen: true,
                    text: selectedText,
                    x: rect.left + rect.width / 2 + window.scrollX,
                    y: rect.top + window.scrollY - 8
                  });
                }
              } catch (e) {}
            } else {
              setSelectionMenu(prev => prev.isOpen ? { ...prev, isOpen: false } : prev);
              setTooltip(prev => prev.isOpen ? { ...prev, isOpen: false } : prev);
            }
          }, 80);
        };

        document.addEventListener('mouseup', handleMouseUp);
        return () => {
          document.removeEventListener('mouseup', handleMouseUp);
        };
      }, [glossaryCache]);

      const handleSearchSelection = async () => {
        const word = selectionMenu.text;
        
        setTooltip({
          isOpen: true,
          word,
          text: GLOSSARY_DB[word] || glossaryCache[word] || '',
          x: selectionMenu.x,
          y: selectionMenu.y,
          isLoading: !(GLOSSARY_DB[word] || glossaryCache[word])
        });
        setSelectionMenu(prev => ({ ...prev, isOpen: false }));

        if (!GLOSSARY_DB[word] && !glossaryCache[word]) {
          try {
            const promptText = `Explain the semiconductor related term "${word}" in 1 concise sentence in Korean.`;
            const explanation = await getGeminiResponse(promptText);
            const cleanExp = explanation.trim();
            setGlossaryCache(prev => ({ ...prev, [word]: cleanExp }));
            
            setTooltip(prev => {
              if (prev.word === word) {
                return { ...prev, text: cleanExp, isLoading: false };
              }
              return prev;
            });
          } catch (err) {
            setTooltip(prev => {
              if (prev.word === word) {
                return { ...prev, text: `해설 로드 실패.\n[원인]: ${err.message}`, isLoading: false };
              }
              return prev;
            });
          }
        }
      };

      return (
        <div className="w-full h-full flex flex-col md:flex-row bg-slate-950/20 overflow-hidden">
          {/* Left Sidebar Navigation for Desktop */}
          <aside className="hidden md:flex flex-col w-64 border-r border-slate-900 bg-slate-950/95 backdrop-blur-lg p-5 justify-between z-40 shrink-0 select-none">
            <div className="space-y-6">
              {/* Logo / Header */}
              <div className="flex flex-col gap-1.5 pb-4 border-b border-slate-900">
                <h1 className="text-base font-black text-slate-100 flex items-center gap-1.5">
                  <i className="fa-solid fa-microchip text-cyan-400"></i>
                  반도체 도와줘!
                </h1>
                <span className="text-cyan-400 text-xs font-semibold px-2.5 py-0.5 rounded bg-cyan-950 border border-cyan-800/40 w-fit">
                  9조
                </span>
              </div>

              {/* Navigation Tabs */}
              <div className="flex flex-col gap-1">
                {[
                  { id: 'roadmap', label: '8대 공정 백서', icon: 'fa-map-location-dot', color: 'text-cyan-400', activeBg: 'bg-cyan-500/10 border-cyan-500/30' },
                  { id: 'history', label: '공정 역사 연표', icon: 'fa-timeline', color: 'text-amber-400', activeBg: 'bg-amber-500/10 border-amber-500/30' },
                  { id: 'quiz', label: '핵심 퀴즈 스테이션', icon: 'fa-award', color: 'text-violet-400', activeBg: 'bg-violet-500/10 border-violet-500/30' },
                  { id: 'news', label: '데일리 브리핑', icon: 'fa-newspaper', color: 'text-rose-400', activeBg: 'bg-rose-500/10 border-rose-500/30' },
                  { id: 'community', label: '자유 게시판', icon: 'fa-clipboard-list', color: 'text-emerald-400', activeBg: 'bg-emerald-500/10 border-emerald-500/30' },
                  { id: 'fet', label: '3D FET 탐색기', icon: 'fa-cube', color: 'text-indigo-400', activeBg: 'bg-indigo-500/10 border-indigo-500/30' }
                ].map(tab => {
                  const isActive = activeTab === tab.id;
                  return (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex items-center gap-3 px-3.5 py-3 rounded-xl border text-xs font-extrabold transition-all ${
                        isActive
                          ? `${tab.activeBg} ${tab.color}`
                          : 'border-transparent text-slate-400 hover:bg-slate-900/40 hover:text-slate-200'
                      }`}
                    >
                      <i className={`fa-solid ${tab.icon} text-sm ${tab.color}`}></i>
                      <span>{tab.label}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Sidebar Footer Controls */}
            <div className="space-y-3 pt-4 border-t border-slate-900">
              {/* PDF upload status */}
              <button 
                onClick={() => setIsPdfModalOpen(true)}
                className={`w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-xs font-bold border transition-colors ${
                  pdfText 
                    ? 'bg-cyan-950/40 text-cyan-400 border-cyan-850' 
                    : 'bg-slate-900 hover:bg-slate-800 text-slate-400 border-slate-800'
                }`}
              >
                <i className="fa-solid fa-paperclip"></i>
                {pdfText ? 'PDF 연동됨' : '교재 PDF 연동'}
              </button>

              {/* API Key Setting */}
              <button
                onClick={() => setIsApiModalOpen(true)}
                className={`w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-xs font-bold border transition-colors ${
                  customApiKey 
                    ? 'bg-emerald-950/40 text-emerald-400 border-emerald-850/60' 
                    : 'bg-slate-900 hover:bg-slate-800 text-slate-400 border-slate-800'
                }`}
              >
                <i className="fa-solid fa-key"></i>
                {customApiKey ? 'API 키 등록됨' : '개인 API 키 입력'}
              </button>

              {/* Theme Selector */}
              <button
                onClick={() => setTheme(prev => {
                  if (prev === 'dark') return 'light';
                  if (prev === 'light') return 'navy';
                  return 'dark';
                })}
                className="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-400 hover:text-slate-200 transition-colors"
                title={
                  theme === 'dark' ? '라이트 모드로 전환' : 
                  theme === 'light' ? '딥 네이비 모드로 전환' : 
                  '다크 모드로 전환'
                }
              >
                <i className={`fa-solid ${
                  theme === 'dark' ? 'fa-moon text-indigo-400' : 
                  theme === 'light' ? 'fa-sun text-amber-500' : 
                  'fa-circle-half-stroke text-cyan-400'
                } text-[11px]`}></i>
                <span className="text-xs font-bold">
                  {theme === 'dark' ? '다크 모드' : theme === 'light' ? '라이트 모드' : '딥 네이비'}
                </span>
              </button>
            </div>
          </aside>

          {/* Right Content Area */}
          <div className="flex-1 flex flex-col min-h-0 relative overflow-hidden">
            {/* Header (Mobile Only) */}
            <header className="shrink-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-900 py-3 px-4 flex items-center justify-between z-10 md:hidden">
              <h1 className="text-base font-black text-slate-100 flex items-center gap-1.5 select-none">
                <i className="fa-solid fa-microchip text-cyan-400"></i>
                반도체 도와줘! <span className="text-cyan-400 text-xs font-semibold px-2 py-0.5 rounded bg-cyan-950 border border-cyan-800/40">9조</span>
              </h1>
              
              <div className="flex items-center gap-2">
                {/* Theme Toggle Button - Icon Only */}
                <button
                  onClick={() => setTheme(prev => {
                    if (prev === 'dark') return 'light';
                    if (prev === 'light') return 'navy';
                    return 'dark';
                  })}
                  className="w-8 h-8 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-400 hover:text-slate-200 transition-all shrink-0 active:scale-95"
                  title={
                    theme === 'dark' ? '라이트 모드로 전환' : 
                    theme === 'light' ? '딥 네이비 모드로 전환' : 
                    '다크 모드로 전환'
                  }
                >
                  <i className={`fa-solid ${
                    theme === 'dark' ? 'fa-moon text-indigo-400' : 
                    theme === 'light' ? 'fa-sun text-amber-500' : 
                    'fa-circle-half-stroke text-cyan-400'
                  } text-xs`}></i>
                </button>

                {/* API Key Setting Button - Icon Only with LED Dot */}
                <button
                  onClick={() => setIsApiModalOpen(true)}
                  className={`w-8 h-8 flex items-center justify-center rounded-xl border transition-all shrink-0 active:scale-95 relative ${
                    customApiKey 
                      ? 'bg-emerald-950/20 text-emerald-400 border-emerald-800/60' 
                      : 'bg-slate-900 text-slate-400 border-slate-800 hover:border-slate-700'
                  }`}
                  title="Gemini API Key 설정"
                >
                  <i className="fa-solid fa-key text-xs"></i>
                  {customApiKey && (
                    <span className="absolute top-1 right-1 w-1.5 h-1.5 bg-emerald-400 rounded-full shadow-[0_0_6px_#34d399] animate-pulse"></span>
                  )}
                </button>

                {/* PDF Attachment Button - Icon Only with LED Dot */}
                <button 
                  onClick={() => setIsPdfModalOpen(true)}
                  className={`w-8 h-8 flex items-center justify-center rounded-xl border transition-all shrink-0 active:scale-95 relative ${
                    pdfText 
                      ? 'bg-cyan-950/20 text-cyan-455 border-cyan-800/60' 
                      : 'bg-slate-900 text-slate-400 border-slate-800 hover:border-slate-700'
                  }`}
                  title="교재 PDF 연동"
                >
                  <i className="fa-solid fa-paperclip text-xs"></i>
                  {pdfText && (
                    <span className="absolute top-1 right-1 w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_6px_#22d3ee] animate-pulse"></span>
                  )}
                </button>
              </div>
            </header>

            {/* Content Main View */}
            <main className="flex-1 min-h-0 px-4 pt-3.5 pb-20 md:pb-6 relative md:max-w-5xl md:mx-auto md:w-full">
              {activeTab === 'roadmap' && (
                <RoadmapTab 
                  onHoverWord={handleHoverWord}
                  onLeaveWord={handleLeaveWord}
                />
              )}
              {activeTab === 'history' && (
                <HistoryTab 
                  onHoverWord={handleHoverWord}
                  onLeaveWord={handleLeaveWord}
                />
              )}
              {activeTab === 'quiz' && (
                <QuizTab 
                  onHoverWord={handleHoverWord}
                  onLeaveWord={handleLeaveWord}
                  prefetchedQuiz={prefetchedQuiz}
                  isPrefetching={isPrefetching}
                  onRegisterScore={handleRegisterScore}
                  onTriggerPrefetch={handleTriggerPrefetch}
                  useAiQuiz={useAiQuiz}
                  setUseAiQuiz={setUseAiQuiz}
                  onOpenRanking={() => setIsRankingModalOpen(true)}
                  pdfText={pdfText}
                />
              )}
              {activeTab === 'news' && (
                <NewsTab 
                  onHoverWord={handleHoverWord}
                  onLeaveWord={handleLeaveWord}
                />
              )}
              {activeTab === 'community' && (
                <CommunityTab />
              )}
              {activeTab === 'fet' && (
                <FetExplorerTab />
              )}
            </main>

            {/* Bottom Mobile Navigation Bar */}
            <nav className="fixed bottom-0 left-0 right-0 h-16 bg-slate-950/95 backdrop-blur-lg border-t border-slate-900/80 flex items-center justify-around px-2 z-40 md:hidden">
              {/* Roadmap Tab Button */}
              <button
                onClick={() => setActiveTab('roadmap')}
                className={`flex flex-col items-center gap-1 py-1 w-16 transition-all ${
                  activeTab === 'roadmap' ? 'text-cyan-400 scale-105' : 'text-slate-500 hover:text-slate-300'
                }`}
              >
                <i className="fa-solid fa-map-location-dot text-lg"></i>
                <span className="text-[9px] font-bold">8대 공정</span>
              </button>

              {/* History Tab Button */}
              <button
                onClick={() => setActiveTab('history')}
                className={`flex flex-col items-center gap-1 py-1 w-16 transition-all ${
                  activeTab === 'history' ? 'text-amber-400 scale-105' : 'text-slate-500 hover:text-slate-300'
                }`}
              >
                <i className="fa-solid fa-timeline text-lg"></i>
                <span className="text-[9px] font-bold">공정 역사</span>
              </button>

              {/* Quiz Tab Button */}
              <button
                onClick={() => setActiveTab('quiz')}
                className={`flex flex-col items-center gap-1 py-1 w-16 transition-all ${
                  activeTab === 'quiz' ? 'text-violet-400 scale-105' : 'text-slate-500 hover:text-slate-300'
                }`}
              >
                <i className="fa-solid fa-award text-lg"></i>
                <span className="text-[9px] font-bold">핵심 퀴즈</span>
              </button>

              {/* News Tab Button */}
              <button
                onClick={() => setActiveTab('news')}
                className={`flex flex-col items-center gap-1 py-1 w-16 transition-all ${
                  activeTab === 'news' ? 'text-rose-400 scale-105' : 'text-slate-500 hover:text-slate-300'
                }`}
              >
                <i className="fa-solid fa-newspaper text-lg"></i>
                <span className="text-[9px] font-bold">데일리 뉴스</span>
              </button>

              {/* Community Tab Button */}
              <button
                onClick={() => setActiveTab('community')}
                className={`flex flex-col items-center gap-1 py-1 w-16 transition-all ${
                  activeTab === 'community' ? 'text-emerald-400 scale-105' : 'text-slate-500 hover:text-slate-300'
                }`}
              >
                <i className="fa-solid fa-clipboard-list text-lg"></i>
                <span className="text-[9px] font-bold">게시판</span>
              </button>
            </nav>
          </div>

          {/* PDF Attachment Modal */}
          <PdfUploadModal
            isOpen={isPdfModalOpen}
            onClose={() => setIsPdfModalOpen(false)}
            pdfText={pdfText}
            setPdfText={setPdfText}
            onTriggerPrefetch={handleTriggerPrefetch}
          />

          {/* API Key Modal */}
          <ApiKeyModal
            isOpen={isApiModalOpen}
            onClose={() => setIsApiModalOpen(false)}
            onKeySave={setCustomApiKey}
          />

          {/* Leaderboard Modal */}
          <RankingModal
            isOpen={isRankingModalOpen}
            onClose={() => setIsRankingModalOpen(false)}
          />

          {/* Floating AI Chatbot overlay */}
          <FloatingAiChat 
            pdfText={pdfText} 
            onHoverWord={handleHoverWord} 
            onLeaveWord={handleLeaveWord} 
          />

          {/* Text Selection Floating Menu */}
          {selectionMenu.isOpen && (
            <button
              style={{
                left: `${selectionMenu.x}px`,
                top: `${selectionMenu.y}px`,
                transform: 'translate(-50%, -100%)'
              }}
              onMouseDown={(e) => {
                e.preventDefault();
                e.stopPropagation();
              }}
              onMouseUp={(e) => {
                e.stopPropagation();
              }}
              onClick={handleSearchSelection}
              className="absolute z-50 px-3 py-1.5 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white border border-cyan-400/40 rounded-xl shadow-xl text-[10.5px] font-bold flex items-center gap-1.5 transition-all scale-105 active:scale-95 fade-in cursor-pointer select-none"
            >
              <i className="fa-solid fa-wand-magic-sparkles text-[10px]"></i>
              AI 용어 해설
            </button>
          )}

          {/* Floating Tooltip Component */}
          {tooltip.isOpen && (
            <div 
              style={{ 
                left: `${tooltip.x}px`, 
                top: `${tooltip.y}px`,
                transform: 'translate(-50%, -100%)' 
              }}
              className="absolute z-50 w-64 p-3 bg-slate-950/95 border border-cyan-500/80 rounded-xl shadow-2xl text-[10.5px] leading-relaxed text-slate-200 pointer-events-none fade-in active-tab-glow backdrop-blur-md"
            >
              <div className="font-extrabold text-cyan-400 mb-1 flex items-center gap-1">
                <i className="fa-solid fa-circle-info text-[9px]"></i>
                {tooltip.word}
              </div>
              {tooltip.isLoading ? (
                <div className="flex items-center gap-1.5 text-slate-500">
                  <i className="fa-solid fa-spinner fa-spin"></i>
                  AI 실시간 정의 검색 중...
                </div>
              ) : (
                tooltip.text
              )}
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then((reg) => console.log('Service Worker registered successfully:', reg.scope))
          .catch((err) => console.warn('Service Worker registration failed:', err));
      });
    }
  </script>
</body>

</html>
